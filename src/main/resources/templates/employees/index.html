<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Daftar Karyawan</h2>
                <p class="text-gray-500">Katalog lengkap data karyawan perusahaan.</p>
            </div>
            <button onclick="prepareEmployeeModal('modalEmployee', 'add')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                + Tambah Karyawan
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200" id="employeeTable">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">NIK / Nama</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Jabatan</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Departemen</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase text-right">Aksi</th>
                    </tr>
                    <!-- Filter Row -->
                    <tr class="bg-gray-50/50">
                        <td class="px-6 py-2"><input type="text" onkeyup="filterTable(0)" placeholder="Cari NIK/Nama..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td class="px-6 py-2"><input type="text" onkeyup="filterTable(1)" placeholder="Cari Jabatan..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td class="px-6 py-2"><input type="text" onkeyup="filterTable(2)" placeholder="Cari Dept..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td class="px-6 py-2"><input type="text" onkeyup="filterTable(3)" placeholder="Cari Email..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td></td>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="emp : ${employees}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold mr-3" 
                                     th:text="${#strings.substring(emp.firstName,0,1)}"></div>
                                <div>
                                    <div class="text-sm font-bold text-gray-900 name-cell" th:text="${emp.firstName + ' ' + emp.lastName}"></div>
                                    <div class="text-xs text-gray-400 nik-cell" th:text="${emp.nik}"></div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${emp.jobId}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${emp.departmentId}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${emp.email}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm space-x-2">
                            <button class="text-blue-600 hover:underline font-medium" 
                                    th:data-id="${emp.id}" th:data-nik="${emp.nik}" th:data-email="${emp.email}"
                                    th:data-first="${emp.firstName}" th:data-last="${emp.lastName}"
                                    th:data-job="${emp.jobId}" th:data-dept="${emp.departmentId}" th:data-role="${emp.role}"
                                    onclick="prepareEmployeeModalByBtn(this, 'detail')">Detail</button>
                            <button class="text-amber-600 hover:underline font-medium" 
                                    th:data-id="${emp.id}" th:data-nik="${emp.nik}" th:data-email="${emp.email}"
                                    th:data-first="${emp.firstName}" th:data-last="${emp.lastName}"
                                    th:data-job="${emp.jobId}" th:data-dept="${emp.departmentId}" th:data-role="${emp.role}"
                                    onclick="prepareEmployeeModalByBtn(this, 'edit')">Edit</button>
                            <form th:id="'deleteForm' + ${emp.id}" th:action="@{/employees/delete/{id}(id=${emp.id})}" method="post" class="inline">
                                <button type="button" class="text-red-500 hover:underline font-medium" 
                                        th:onclick="'confirmAction(\'deleteForm' + ${emp.id} + '\', \'Hapus Karyawan?\', \'Semua data terkait karyawan ini akan dihapus permanen.\', \'error\')'">Hapus</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="5" class="px-6 py-10 text-center text-gray-400 italic font-medium">Belum ada data karyawan.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Employee -->
        <div id="modalEmployee" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden flex flex-col relative border border-white max-h-[90vh]">
                <!-- Sticky Close Button -->
                <button type="button" onclick="closeModal('modalEmployee')" 
                        class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-colors z-[120] p-2 hover:bg-gray-50 rounded-full">
                    <i class="fas fa-times text-xl"></i>
                </button>

                <div class="p-10 overflow-y-auto custom-scrollbar">
                    <h3 id="modalTitle" class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Karyawan</h3>
                    <form id="formEmployee" th:action="@{/employees}" method="post" class="space-y-6">
                        <input type="hidden" name="id" id="empId">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">NIK</label>
                                <input type="text" name="nik" id="empNik" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 transition-all outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Email</label>
                                <input type="email" name="email" id="empEmail" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 transition-all outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Nama Depan</label>
                                <input type="text" name="firstName" id="empFirstName" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Nama Belakang</label>
                                <input type="text" name="lastName" id="empLastName" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Jabatan</label>
                                <select name="jobId" id="empJob" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl appearance-none">
                                    <option value="">Pilih Jabatan</option>
                                    <option th:each="j : ${jobs}" th:value="${j.id}" th:text="${j.title}"></option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Departemen</label>
                                <select name="departmentId" id="empDept" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl appearance-none">
                                    <option value="">Pilih Departemen</option>
                                    <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="authFields">
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Role Akses</label>
                                <select name="role" id="empRole" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                                    <option value="EMPLOYEE">Karyawan</option>
                                    <option value="ADMIN">Admin</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                                <input type="password" name="password" id="empPassword" placeholder="••••••••" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none transition-all">
                            </div>
                        </div>
                        <div class="flex justify-end space-x-4 pt-8">
                            <button type="button" onclick="closeModal('modalEmployee')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                            <button type="button" onclick="submitEmployeeForm()" id="btnSubmit" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                                SIMPAN KARYAWAN
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Escape Key Listener
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal('modalEmployee');
        });

        function submitEmployeeForm() {
            const isEdit = document.getElementById('empId').value !== '';
            confirmAction('formEmployee', 
                isEdit ? 'Ubah Data Karyawan?' : 'Tambah Karyawan Baru?', 
                isEdit ? 'Perubahan pada data karyawan ini akan disimpan.' : 'Data karyawan baru akan ditambahkan ke sistem.',
                'question');
        }

        function prepareEmployeeModalByBtn(btn, mode) {
            const data = {
                id: btn.getAttribute('data-id'),
                nik: btn.getAttribute('data-nik'),
                email: btn.getAttribute('data-email'),
                firstName: btn.getAttribute('data-first'),
                lastName: btn.getAttribute('data-last'),
                jobId: btn.getAttribute('data-job'),
                departmentId: btn.getAttribute('data-dept'),
                role: btn.getAttribute('data-role')
            };
            prepareEmployeeModal('modalEmployee', mode, data);
        }

        function prepareEmployeeModal(modalId, mode, data) {
            const modal = document.getElementById(modalId);
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('btnSubmit');
            const form = modal.querySelector('form');
            const inputs = form.querySelectorAll('input, select');

            form.reset();
            inputs.forEach(i => {
                i.disabled = (mode === 'detail');
                i.classList.remove('bg-gray-200');
                if (mode === 'detail') i.classList.add('bg-gray-200');
            });
            
            if (submitBtn) submitBtn.style.display = (mode === 'detail' ? 'none' : 'block');

            if (mode === 'add') {
                title.innerText = 'Tambah Karyawan Baru';
                document.getElementById('empId').value = '';
                document.getElementById('empPassword').required = true;
            } else {
                title.innerText = (mode === 'detail' ? 'Detail Karyawan' : 'Ubah Data Karyawan');
                document.getElementById('empId').value = data.id;
                document.getElementById('empNik').value = data.nik;
                document.getElementById('empEmail').value = data.email;
                document.getElementById('empFirstName').value = data.firstName;
                document.getElementById('empLastName').value = data.lastName;
                document.getElementById('empJob').value = data.jobId;
                document.getElementById('empDept').value = data.departmentId;
                document.getElementById('empRole').value = data.role;
                document.getElementById('empPassword').required = false; // Optional on edit
            }
            modal.classList.remove('hidden');
        }

        function filterTable(columnIndex) {
            const inputs = document.querySelectorAll('thead input');
            const rows = document.querySelectorAll('tbody tr:not(.empty-row)');
            
            rows.forEach(row => {
                let show = true;
                inputs.forEach((input, idx) => {
                    if (input.value) {
                        const cellText = row.cells[idx].innerText.toLowerCase();
                        if (!cellText.includes(input.value.toLowerCase())) {
                            show = false;
                        }
                    }
                });
                row.style.display = show ? '' : 'none';
            });
        }
    </script>
</body>
</html>
