<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <style>
        /* Minimalist DataTables Overrides - Replicated from Audit Logs for Consistency */
        .dataTables_wrapper .dataTables_length select {
            border: none;
            background: #f8fafc;
            border-radius: 12px;
            padding: 8px 30px 8px 15px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
        }
        .dataTables_wrapper .dataTables_filter { display: none; }
        
        table.dataTable { border-collapse: collapse !important; border: none !important; }
        table.dataTable thead th { border-bottom: none !important; color: #94a3b8 !important; }
        table.dataTable tbody tr { background: transparent !important; }
        table.dataTable tbody tr:hover { background: #f8fafc !important; }
        table.dataTable tbody td { padding: 1rem 1.5rem !important; border: none !important; border-bottom: 1px solid #f1f5f9 !important; }
        
        .dt-buttons .dt-button {
            background: #f8fafc !important;
            border: none !important;
            border-radius: 12px !important;
            color: #64748b !important;
            font-size: 10px !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.1em !important;
            padding: 10px 20px !important;
            box-shadow: none !important;
            transition: all 0.2s;
        }
        .dt-buttons .dt-button:hover {
            background: #eff6ff !important;
            color: #2563eb !important;
        }
        
        /* ColVis Collection Styling */
        .dt-button-collection {
            background: rgba(255, 255, 255, 0.98) !important;
            backdrop-filter: blur(10px);
            border-radius: 24px !important;
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
            padding: 12px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15) !important;
            margin-top: 10px !important;
        }
        .dt-button-collection .dt-button {
            background: transparent !important;
            border: none !important;
            border-radius: 12px !important;
            text-align: left !important;
            padding: 12px 16px !important;
            margin: 2px 0 !important;
            font-size: 11px !important;
            font-weight: 700 !important;
            color: #64748b !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            transition: all 0.2s !important;
        }
        .dt-button-collection .dt-button:hover {
            background: #f8fafc !important;
            color: #2563eb !important;
        }
        /* Checkbox indicator for active columns */
        .dt-button-collection .dt-button::after {
            content: "\f0c8"; /* Unchecked square */
            font-family: "Font Awesome 6 Free";
            font-weight: 400;
            margin-left: 10px;
            color: #cbd5e1;
            font-size: 14px;
        }
        .dt-button-collection .dt-button.active {
            background: #eff6ff !important;
            color: #2563eb !important;
        }
        .dt-button-collection .dt-button.active::after {
            content: "\f14a"; /* Checked square */
            font-weight: 900;
            color: #2563eb;
        }
        
        .dataTables_paginate .paginate_button {
            border: none !important;
            background: transparent !important;
            font-size: 11px !important;
            font-weight: 700 !important;
            border-radius: 10px !important;
            padding: 5px 12px !important;
            transition: all 0.2s;
        }
        .dataTables_paginate .paginate_button.current {
            background: #2563eb !important;
            color: white !important;
        }
        .dataTables_paginate .paginate_button:hover:not(.current) {
            background: #f1f5f9 !important;
            color: #2563eb !important;
        }

        .dataTables_info {
            font-size: 11px !important;
            font-weight: 600 !important;
            color: #94a3b8 !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Table responsive fixes */
        #employeeTable_wrapper { padding: 0; }
    </style>

    <div>
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Daftar Karyawan</h2>
                <p class="text-gray-500 font-medium">Katalog lengkap data manajemen sumber daya manusia.</p>
            </div>
            <div class="flex items-center gap-3">
                <div id="tableButtons"></div>
                <button onclick="prepareEmployeeModal('modalEmployee', 'add')" 
                        class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black hover:bg-blue-700 transition-all shadow-xl shadow-blue-500/20 active:scale-95 text-sm uppercase tracking-wider">
                    + Tambah Karyawan
                </button>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden p-8">
            <table class="min-w-full display responsive nowrap" id="employeeTable" style="width: 100%">
                <thead class="bg-gray-50/50">
                    <tr>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6 px-6">NIK / Nama</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6 px-6">Jabatan</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6 px-6">Departemen</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6 px-6">Email</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-right py-6 px-6">Aksi</th>
                    </tr>
                    <!-- Filter Row -->
                    <tr class="search-row border-b border-gray-100">
                        <td class="px-6 py-2 pb-4">
                            <input type="text" placeholder="Cari NIK/Nama..." class="w-full text-[10px] font-bold p-2 bg-transparent focus:outline-none placeholder-gray-300 border-b border-transparent focus:border-blue-500 transition-all">
                        </td>
                        <td class="px-6 py-2 pb-4">
                            <input type="text" placeholder="Filter Jabatan..." class="w-full text-[10px] font-bold p-2 bg-transparent focus:outline-none placeholder-gray-300 border-b border-transparent focus:border-blue-500 transition-all">
                        </td>
                        <td class="px-6 py-2 pb-4">
                            <input type="text" placeholder="Filter Dept..." class="w-full text-[10px] font-bold p-2 bg-transparent focus:outline-none placeholder-gray-300 border-b border-transparent focus:border-blue-500 transition-all">
                        </td>
                        <td class="px-6 py-2 pb-4">
                            <input type="text" placeholder="Filter Email..." class="w-full text-[10px] font-bold p-2 bg-transparent focus:outline-none placeholder-gray-300 border-b border-transparent focus:border-blue-500 transition-all">
                        </td>
                        <td></td>
                    </tr>
                </thead>
                <tbody class="bg-white">
                    <tr th:each="emp : ${employees}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="h-10 w-10 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 font-black text-sm mr-4 shadow-sm" 
                                     th:text="${#strings.substring(emp.firstName != null ? emp.firstName : 'U', 0, 1)}"></div>
                                <div>
                                    <div class="text-sm font-black text-gray-900" th:text="${emp.firstName + ' ' + emp.lastName}"></div>
                                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest" th:text="${emp.nik}"></div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="text-xs font-bold text-gray-600 bg-gray-50 px-3 py-1 rounded-lg" 
                                  th:text="${emp.job != null ? emp.job.title : (emp.jobId != null ? emp.jobId : '-')}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-lg" 
                                  th:text="${emp.department != null ? emp.department.name : (emp.departmentId != null ? emp.departmentId : '-')}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-xs font-medium text-gray-500" th:text="${emp.email}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm space-x-1">
                            <button class="p-2 text-blue-600 hover:bg-blue-50 rounded-xl transition-all" 
                                    th:data-id="${emp.id}" th:data-nik="${emp.nik}" th:data-email="${emp.email}"
                                    th:data-first="${emp.firstName}" th:data-last="${emp.lastName}"
                                    th:data-job="${emp.jobId}" th:data-dept="${emp.departmentId}" th:data-role="${emp.role}"
                                    onclick="prepareEmployeeModalByBtn(this, 'detail')" title="Detail">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="p-2 text-amber-600 hover:bg-amber-50 rounded-xl transition-all" 
                                    th:data-id="${emp.id}" th:data-nik="${emp.nik}" th:data-email="${emp.email}"
                                    th:data-first="${emp.firstName}" th:data-last="${emp.lastName}"
                                    th:data-job="${emp.jobId}" th:data-dept="${emp.departmentId}" th:data-role="${emp.role}"
                                    onclick="prepareEmployeeModalByBtn(this, 'edit')" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <form th:id="'deleteForm' + ${emp.id}" th:action="@{/employees/delete/{id}(id=${emp.id})}" method="post" class="inline">
                                <button type="button" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-all" 
                                        th:onclick="'confirmAction(\'deleteForm' + ${emp.id} + '\', \'Hapus Karyawan?\', \'Semua data terkait karyawan ini akan dihapus permanen.\', \'error\')'" title="Hapus">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Employee -->
        <div id="modalEmployee" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden flex flex-col relative border border-white max-h-[90vh]">
                <button type="button" onclick="closeModal('modalEmployee')" 
                        class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-colors z-[120] p-2 hover:bg-gray-50 rounded-full">
                    <i class="fas fa-times text-xl"></i>
                </button>

                <div class="p-10 overflow-y-auto custom-scrollbar">
                    <h3 id="modalTitle" class="text-2xl font-black mb-8 text-gray-900 tracking-tight text-center">Karyawan</h3>
                    <form id="formEmployee" th:action="@{/employees}" method="post" class="space-y-6">
                        <input type="hidden" name="id" id="empId">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">NIK</label>
                                <input type="text" name="nik" id="empNik" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 transition-all outline-none font-bold">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Email</label>
                                <input type="email" name="email" id="empEmail" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 transition-all outline-none font-bold">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Nama Depan</label>
                                <input type="text" name="firstName" id="empFirstName" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold transition-all outline-none focus:ring-4 focus:ring-blue-100">
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Nama Belakang</label>
                                <input type="text" name="lastName" id="empLastName" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold transition-all outline-none focus:ring-4 focus:ring-blue-100">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Jabatan</label>
                                <select name="jobId" id="empJob" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold appearance-none transition-all outline-none focus:ring-4 focus:ring-blue-100">
                                    <option value="">Pilih Jabatan</option>
                                    <option th:each="j : ${jobs}" th:value="${j.id}" th:text="${j.title}"></option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Departemen</label>
                                <select name="departmentId" id="empDept" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold appearance-none transition-all outline-none focus:ring-4 focus:ring-blue-100">
                                    <option value="">Pilih Departemen</option>
                                    <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="authFields">
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Role Akses</label>
                                <select name="role" id="empRole" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-bold transition-all outline-none focus:ring-4 focus:ring-blue-100">
                                    <option value="EMPLOYEE">Karyawan</option>
                                    <option value="ADMIN">Admin</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                                <input type="password" name="password" id="empPassword" placeholder="••••••••" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none transition-all font-bold">
                            </div>
                        </div>
                        <div class="flex justify-end space-x-4 pt-8 border-t border-gray-50 mt-4">
                            <button type="button" onclick="closeModal('modalEmployee')" class="px-6 py-3 text-gray-400 font-bold hover:text-gray-600 transition-all uppercase text-xs tracking-widest">Batal</button>
                            <button type="button" onclick="submitEmployeeForm()" id="btnSubmit" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-500/10 hover:bg-blue-700 active:scale-95 transition-all uppercase text-xs tracking-widest">
                                SIMPAN KARYAWAN
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        $(document).ready(function() {
            // DataTables Initialization
            const table = $('#employeeTable').DataTable({
                responsive: true,
                orderCellsTop: true,
                lengthMenu: [ [10, 25, 50, -1], [10, 25, 50, "Semua"] ],
                dom: '<"flex justify-between items-center mb-4"lB>rt<"flex justify-between items-center mt-6"ip>',
                buttons: [
                    {
                        extend: 'colvis',
                        text: '<i class="fas fa-columns mr-2"></i> Kolom',
                        className: 'btn-colvis'
                    }
                ],
                language: {
                    lengthMenu: "Tampilkan _MENU_ data",
                    zeroRecords: "Data tidak ditemukan",
                    info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ data",
                    infoEmpty: "Menampilkan 0 sampai 0 dari 0 data",
                    infoFiltered: "(difilter dari _MAX_ total data)",
                    paginate: {
                        first: "Pertama",
                        last: "Terakhir",
                        next: "Lanjut",
                        previous: "Kembali"
                    },
                    search: "Cari:"
                }
            });

            // Move Buttons to pre-defined container
            table.buttons().container().appendTo('#tableButtons');

            // Per-column search binding with debounce
            let searchTimeout = null;
            $('#employeeTable thead .search-row input').on('keyup change', function() {
                const colIdx = $(this).closest('td').index();
                const val = this.value;
                
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    table.column(colIdx).search(val).draw();
                }, 300);
            });

            // Prevent sorting when clicking on filter inputs
            $('#employeeTable thead .search-row').on('click', function(e) {
                e.stopPropagation();
            });
        });

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Escape Key Listener
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal('modalEmployee');
        });

        function submitEmployeeForm() {
            const isEdit = document.getElementById('empId').value !== '';
            confirmAction('formEmployee', 
                isEdit ? 'Ubah Data Karyawan?' : 'Tambah Karyawan Baru?', 
                isEdit ? 'Perubahan pada data karyawan ini akan disimpan.' : 'Data karyawan baru akan ditambahkan ke sistem.',
                'question');
        }

        function prepareEmployeeModalByBtn(btn, mode) {
            const data = {
                id: btn.getAttribute('data-id'),
                nik: btn.getAttribute('data-nik'),
                email: btn.getAttribute('data-email'),
                firstName: btn.getAttribute('data-first'),
                lastName: btn.getAttribute('data-last'),
                jobId: btn.getAttribute('data-job'),
                departmentId: btn.getAttribute('data-dept'),
                role: btn.getAttribute('data-role')
            };
            prepareEmployeeModal('modalEmployee', mode, data);
        }

        function prepareEmployeeModal(modalId, mode, data) {
            const modal = document.getElementById(modalId);
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('btnSubmit');
            const form = modal.querySelector('form');
            const inputs = form.querySelectorAll('input, select');

            form.reset();
            inputs.forEach(i => {
                i.disabled = (mode === 'detail');
                i.classList.remove('bg-gray-100');
                if (mode === 'detail') i.classList.add('bg-gray-100');
            });
            
            if (submitBtn) submitBtn.style.display = (mode === 'detail' ? 'none' : 'block');

            if (mode === 'add') {
                title.innerText = 'Tambah Karyawan Baru';
                document.getElementById('empId').value = '';
                document.getElementById('empPassword').required = true;
            } else {
                title.innerText = (mode === 'detail' ? 'Detail Karyawan' : 'Ubah Data Karyawan');
                document.getElementById('empId').value = data.id;
                document.getElementById('empNik').value = data.nik;
                document.getElementById('empEmail').value = data.email;
                document.getElementById('empFirstName').value = data.firstName;
                document.getElementById('empLastName').value = data.lastName;
                document.getElementById('empJob').value = data.jobId;
                document.getElementById('empDept').value = data.departmentId;
                document.getElementById('empRole').value = data.role;
                document.getElementById('empPassword').required = false; 
            }
            modal.classList.remove('hidden');
        }
    </script>
</body>
</html>
