<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HR Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            background: #020617;
        }
        
        .elegant-bg {
            position: fixed;
            inset: 0;
            background: url('/images/login-bg-v2.png');
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: slow-zoom 20s infinite alternate ease-in-out;
        }

        @keyframes slow-zoom {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* Subtle Light Particles */
        .particle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(1px);
            animation: drift linear infinite;
        }
        @keyframes drift {
            from { transform: translateY(0) translateX(0); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            to { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.4);
        }

        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Focus Ring Style */
        .input-group:focus-within .input-icon {
            color: #2563eb;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div class="elegant-bg"></div>
    
    <!-- Subtle Ambient Particles -->
    <div class="particle-container">
        <div class="particle" style="width: 2px; height: 2px; left: 10%; top: 90%; animation-duration: 15s;"></div>
        <div class="particle" style="width: 3px; height: 3px; left: 30%; top: 100%; animation-duration: 20s; animation-delay: 2s;"></div>
        <div class="particle" style="width: 2px; height: 2px; left: 50%; top: 80%; animation-duration: 18s; animation-delay: 5s;"></div>
        <div class="particle" style="width: 4px; height: 4px; left: 70%; top: 95%; animation-duration: 25s; animation-delay: 8s;"></div>
        <div class="particle" style="width: 2px; height: 2px; left: 85%; top: 90%; animation-duration: 22s; animation-delay: 1s;"></div>
    </div>

    <div class="w-full max-w-lg fade-in relative z-10">
        <div class="glass-effect rounded-[3.5rem] overflow-hidden">
            <!-- Branding Header -->
            <div class="pt-14 pb-8 px-12 text-center border-b border-slate-50">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-xl shadow-blue-500/20 mb-6">
                    <i class="fas fa-users-cog text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">HRMS Login</h1>
                <p class="text-slate-500 mt-2 font-medium">Sistem Manajemen Human Resource</p>
            </div>

            <div class="p-12">
                <div th:if="${error}" id="errorAlert" 
                     class="mb-8 p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-sm font-bold flex items-center transition-all duration-700 ease-in-out">
                    <i class="fas fa-exclamation-circle mr-3 text-lg"></i>
                    <span th:text="${error}">NIK atau Password salah</span>
                </div>

                <form th:action="@{/login}" method="post" class="space-y-6">
                    <!-- NIK -->
                    <div class="space-y-2 input-group">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nomor Induk Karyawan</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-6 flex items-center text-slate-300 input-icon transition-colors">
                                <i class="fas fa-id-card"></i>
                            </span>
                            <input type="text" name="nik" required placeholder="Masukkan NIK"
                                   class="w-full pl-14 pr-7 py-4 bg-slate-50/50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:bg-white transition-all outline-none font-medium text-slate-700">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="space-y-2 input-group">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Kata Sandi</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-6 flex items-center text-slate-300 input-icon transition-colors">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" name="password" required placeholder="••••••••"
                                   class="w-full pl-14 pr-7 py-4 bg-slate-50/50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:bg-white transition-all outline-none font-medium text-slate-700">
                        </div>
                    </div>

                    <!-- CAPTCHA Section -->
                    <div class="space-y-3">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Verifikasi Keamanan</label>
                        <div class="flex items-center gap-3 bg-slate-50/50 p-2 rounded-2xl border border-slate-100">
                            <!-- Image + Refresh Group -->
                            <div class="flex items-center bg-white rounded-xl border border-slate-200 overflow-hidden pr-1">
                                <img id="captchaImg" src="/captcha-image" alt="Captcha" class="h-11 w-44 object-contain">
                                <button type="button" onclick="refreshCaptcha()" class="p-2 text-slate-400 hover:text-blue-500 transition-colors">
                                    <i class="fas fa-sync-alt text-xs"></i>
                                </button>
                            </div>
                            <!-- Input -->
                            <input type="text" name="captcha" required placeholder="KODE" maxlength="6" autocomplete="off" spellcheck="false"
                                   class="flex-1 min-w-0 px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all outline-none font-black text-center tracking-widest text-slate-700 uppercase">
                        </div>
                    </div>

                    <button type="submit" 
                            class="w-full bg-slate-900 text-white py-5 rounded-2x; font-black text-lg shadow-2xl shadow-slate-900/10 hover:bg-blue-600 transition-all active:scale-[0.98] mt-6">
                        Masuk Ke Sistem
                    </button>
                </form>
            </div>

            <!-- Error Sound -->
            <audio id="errorSound" preload="auto">
                <source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" type="audio/mpeg">
            </audio>
            
            <div class="py-8 bg-slate-50/50 text-center border-t border-slate-100">
                <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">© 2026 HR Management System</p>
            </div>
        </div>
    </div>

    <script>
        function refreshCaptcha() {
            document.getElementById('captchaImg').src = '/captcha-image?t=' + new Date().getTime();
        }

        // Auto-hide alert after 5 seconds + Play sound logic
        document.addEventListener('DOMContentLoaded', function() {
            const alert = document.getElementById('errorAlert');
            if (alert) {
                // Play fail sound
                const sound = document.getElementById('errorSound');
                if (sound) sound.play().catch(e => console.log('Audio play failed:', e));

                setTimeout(() => {
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        alert.style.display = 'none';
                    }, 700); // Wait for transition
                }, 5000);
            }
        });
    </script>
</body>
</html>
