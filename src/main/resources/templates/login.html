<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HR Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-xl shadow-blue-200 mb-4">
                <i class="fas fa-users-cog text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">HRMS Login</h1>
            <p class="text-slate-500 mt-2">Selamat datang di Sistem Manajemen HR</p>
        </div>

        <div class="glass-effect rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
            <div class="p-8 lg:p-12">
                <div th:if="${error}" class="mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-sm font-medium flex items-center">
                    <i class="fas fa-exclamation-circle mr-3 text-lg"></i>
                    <span th:text="${error}">NIK atau Password salah</span>
                </div>

                <form th:action="@{/login}" method="post" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1">Nomor Induk Karyawan (NIK)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-id-card"></i>
                            </span>
                            <input type="text" name="nik" required placeholder="Masukkan NIK"
                                   class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:bg-white transition-all outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2 ml-1">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" name="password" required placeholder="••••••••"
                                   class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 focus:bg-white transition-all outline-none">
                        </div>
                    </div>

                    <button type="submit" 
                            class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all">
                        Masuk Sekarang
                    </button>
                </form>
            </div>
            
            <div class="p-6 bg-slate-50 border-t border-slate-100 text-center">
                <p class="text-xs text-slate-400">© 2026 HR Management System</p>
            </div>
        </div>
    </div>
</body>
</html>
