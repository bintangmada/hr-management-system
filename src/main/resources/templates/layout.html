<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Bintang</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
    
    <!-- DataTables JS & jQuery (Moved up to ensure availability for fragments) -->
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(229, 231, 235, 1);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-collapsed { width: 80px !important; }
        .sidebar-collapsed .sidebar-text { display: none !important; }
        .sidebar-collapsed .sidebar-header-text { display: none !important; }
        .sidebar-collapsed .sidebar-submenu-arrow { display: none !important; }
        /* Hide submenus specifically when collapsed to prevent overflow */
        .sidebar-collapsed div[id^="submenu"] { display: none !important; }
        
        /* Center icons and remove horizontal layout constraints when collapsed */
        .sidebar-collapsed nav a, .sidebar-collapsed nav button, .sidebar-collapsed aside > div > h1 { 
            justify-content: center !important; 
            padding-left: 0.5rem !important;
            padding-right: 0.5rem !important;
        }
        .sidebar-collapsed nav i, .sidebar-collapsed aside > div > h1 i { 
            margin-right: 0 !important; 
            font-size: 1.25rem;
        }
        .sidebar-collapsed .absolute.bottom-0 button {
            justify-content: center !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }

        .main-expanded { margin-left: 80px !important; }
        .transition-sidebar { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Mobile Backdrop -->
    <div id="sidebarBackdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden transition-opacity duration-300"></div>

    <!-- Sidebar -->
    <aside id="mainSidebar" class="fixed inset-y-0 left-0 w-64 glass-sidebar transition-transform duration-300 -translate-x-full lg:translate-x-0 z-50 shadow-2xl lg:shadow-none">
        <div class="px-6 py-8 flex items-center justify-between overflow-hidden sidebar-header-container">
            <h1 class="text-2xl font-bold text-blue-600 flex items-center whitespace-nowrap w-full transition-all">
                <i class="fas fa-users-cog mr-2 shrink-0"></i> 
                <span class="sidebar-header-text">HRMS</span>
            </h1>
            <!-- Close button for mobile -->
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <nav id="sidebarNav" class="p-4 space-y-2 overflow-y-auto max-h-[calc(100vh-160px)] custom-scrollbar">
            <div th:each="wrapper : ${sidebarMenus}" class="relative group">
                <div th:if="${not #lists.isEmpty(wrapper.children)}" 
                     th:with="isActive=${#lists.contains(wrapper.children.![url], currentUri) || #lists.contains(wrapper.children.![url], (currentUri != null && currentUri.endsWith('/') ? currentUri.substring(0, currentUri.length() - 1) : currentUri + '/'))}" 
                     class="relative">
                    <button th:data-target-id="'submenu' + ${wrapper.menu.id}" 
                            onclick="toggleSubmenu(this.getAttribute('data-target-id'), this)"
                            th:class="'w-full flex items-center justify-between px-4 py-3 text-sm font-medium rounded-lg transition-all ' + (${isActive} ? 'bg-blue-50 text-blue-600' : 'text-gray-700 hover:bg-blue-50 hover:text-blue-600')">
                        <span class="flex items-center overflow-hidden">
                            <i th:class="${wrapper.menu.icon != null ? wrapper.menu.icon : 'fas fa-circle text-[6px]'} + ' w-6 shrink-0'"></i>
                            <span th:text="${wrapper.menu.title}" class="sidebar-text whitespace-nowrap">Title</span>
                        </span>
                        <i th:class="'fas fa-chevron-down text-[10px] transition-transform duration-300 sidebar-submenu-arrow ' + (${isActive} ? 'rotate-180' : '')" th:id="'arrow' + ${wrapper.menu.id}"></i>
                    </button>
                    <div th:id="'submenu' + ${wrapper.menu.id}" 
                         th:class="'pl-10 mt-1 space-y-1 ' + (${isActive} ? '' : 'hidden')">
                        <a th:each="child : ${wrapper.children}" 
                           th:href="@{${child.url}}" 
                           th:class="'block py-2 text-xs font-medium transition-colors ' + (${child.url == currentUri || child.url + '/' == currentUri} ? 'text-blue-600 font-black' : 'text-gray-500 hover:text-blue-600')"
                           th:text="${child.title}">Child</a>
                    </div>
                </div>
                
                <!-- If NO children: Standard link -->
                <a th:if="${#lists.isEmpty(wrapper.children)}" 
                   th:href="@{${wrapper.menu.url}}" 
                   class="flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-all overflow-hidden">
                    <i th:class="${wrapper.menu.icon != null ? wrapper.menu.icon : 'fas fa-circle text-[6px]'} + ' w-6 shrink-0'"></i>
                    <span th:text="${wrapper.menu.title}" class="sidebar-text whitespace-nowrap">Title</span>
                </a>
            </div>
        </nav>

        <!-- Toggle Collapse/Expand at Bottom -->
        <div class="absolute bottom-0 w-full p-4 border-t border-gray-100 bg-white">
            <button onclick="toggleCollapse()" class="w-full flex items-center px-4 py-3 text-sm font-bold rounded-xl text-gray-500 hover:bg-gray-50 transition-all overflow-hidden">
                <i id="collapseIcon" class="fas fa-indent w-6 shrink-0"></i> 
                <span class="sidebar-text ml-1 whitespace-nowrap">Tutup Menu</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="mainContent" class="lg:ml-64 min-h-screen transition-sidebar duration-300">
        <!-- Top Bar -->
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-40">
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-500 hover:text-gray-700 active:scale-90 transition-transform">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="relative w-96 hidden md:block">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" id="globalSearchInput" placeholder="Pencarian Cepat (Ctrl + K)..." 
                       class="w-full bg-gray-50 border-none rounded-xl pl-10 pr-4 py-2 focus:ring-2 focus:ring-blue-100 text-sm transition-all focus:bg-white border-transparent focus:border-blue-200 outline-none">
                
                <!-- Search Results Panel -->
                <div id="searchResultPanel" class="absolute top-full left-0 w-full mt-2 bg-white border border-gray-100 rounded-2xl shadow-2xl hidden z-[100] overflow-hidden backdrop-blur-xl bg-opacity-95">
                    <div id="searchResultsList" class="max-h-[400px] overflow-y-auto custom-scrollbar">
                        <!-- Results injected here -->
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <!-- Notifications Dropdown -->
                <div class="relative" id="notifDropdown">
                    <button onclick="toggleNotif()" class="text-gray-500 hover:text-gray-700 relative p-2 rounded-full hover:bg-gray-100 transition-all">
                        <i class="fas fa-bell text-xl"></i>
                        <span th:if="${unreadCount > 0}" 
                              class="absolute top-1 right-1 block h-5 w-5 rounded-full bg-red-500 text-[10px] font-black text-white flex items-center justify-center ring-2 ring-white" 
                              th:text="${unreadCount}">3</span>
                    </button>
                    
                    <!-- Dropdown Panel -->
                    <div id="notifPanel" class="hidden absolute right-0 mt-4 w-80 bg-white rounded-[2rem] shadow-2xl border border-gray-100 z-[100] overflow-hidden">
                        <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                            <h3 class="text-sm font-black text-gray-800 uppercase tracking-widest">Notifikasi</h3>
                            <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg" th:text="${unreadCount + ' Baru'}"></span>
                        </div>
                        <div class="max-h-96 overflow-y-auto custom-scrollbar">
                            <div th:each="n : ${recentNotifications}" class="group">
                                <a th:href="@{'/notifications/read/' + ${n.id}}" 
                                   th:class="${n.isRead ? 'bg-white' : 'bg-blue-50/40'} + ' block p-5 hover:bg-blue-50 transition-all border-b border-gray-50 last:border-0 border-l-4 border-l-transparent hover:border-l-blue-500 relative'">
                                    
                                    <!-- Unread Dot -->
                                    <span th:if="${!n.isRead}" class="absolute top-6 right-6 w-2 h-2 bg-blue-500 rounded-full shadow-sm shadow-blue-200"></span>
                                    
                                    <h4 class="text-xs font-black text-gray-800 mb-1 group-hover:text-blue-600 transition-colors uppercase tracking-tight" th:text="${n.title}">Title</h4>
                                    <p class="text-[11px] text-gray-500 leading-relaxed font-medium" th:text="${n.message}">Message content here...</p>
                                    <span class="text-[9px] text-gray-400 mt-2 block font-bold" th:text="${#temporals.format(n.createdAt, 'dd MMM, HH:mm')}">Time</span>
                                </a>
                            </div>
                            <div th:if="${#lists.isEmpty(recentNotifications)}" class="p-10 text-center">
                                <div class="w-12 h-12 bg-gray-50 text-gray-300 rounded-full flex items-center justify-center mx-auto mb-3">
                                    <i class="fas fa-bell-slash"></i>
                                </div>
                                <p class="text-xs text-gray-400 italic">Tidak ada notifikasi.</p>
                            </div>
                        </div>
                        <div class="p-4 bg-gray-50 text-center">
                            <button class="text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-blue-600 transition-colors">Arsip Notifikasi</button>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-4 border-l border-gray-100 pl-6 h-8">
                    <!-- Avatar with Name Initial -->
                    <div class="h-9 w-9 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-sm shadow-lg shadow-blue-100 cursor-pointer hover:scale-105 transition-all" 
                         th:title="${employeeName != null ? employeeName : nik}">
                        <span th:text="${employeeName != null && !#strings.isEmpty(employeeName) ? #strings.substring(employeeName, 0, 1) : 'U'}">B</span>
                    </div>
                    
                    <!-- Logout -->
                    <a th:href="@{/logout}" class="flex items-center space-x-2 px-5 py-2.5 text-[10px] font-black text-red-500 bg-red-50 hover:bg-red-500 hover:text-white rounded-2xl transition-all active:scale-95 group">
                        <i class="fas fa-power-off group-hover:rotate-12 transition-transform"></i>
                        <span>LOGOUT</span>
                    </a>
                </div>
            </div>
        </header>

        <!-- Hidden inputs for backend messages to avoid scripting errors -->
        <input type="hidden" id="successMsg" th:value="${successMessage}">
        <input type="hidden" id="errorMsg" th:value="${errorMessage}">

        <!-- Content Area -->
        <div class="p-8">
            <div th:replace="~{${content} :: area_konten}">
                <!-- Dynamic Content Here -->
            </div>
        </div>
    </main>

    <!-- Global Scripts -->
    <!-- Success Sound -->
    <audio id="successSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
    </audio>
    <!-- Error Sound -->
    <audio id="errorSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" type="audio/mpeg">
    </audio>

    <script th:inline="javascript">
        // Global Toast Configuration
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        // Global Confirmation Function
        function confirmAction(formId, title = 'Apakah Anda yakin?', text = 'Aksi ini tidak dapat dibatalkan!', icon = 'warning') {
            Swal.fire({
                title: title,
                text: text,
                icon: icon,
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Lanjutkan!',
                cancelButtonText: 'Batal',
                reverseButtons: true,
                customClass: {
                    container: 'z-[9999]',
                    popup: 'rounded-[2rem]'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById(formId).submit();
                }
            });
        }

        // Show Notifications based on Backend Messages
        const successMessage = document.getElementById('successMsg').value;
        const errorMessage = document.getElementById('errorMsg').value;

        if (successMessage) {
            const sound = document.getElementById('successSound');
            if (sound) sound.play().catch(e => console.log('Audio play failed:', e));
            Toast.fire({ 
                icon: 'success', 
                title: successMessage,
                background: '#22c55e', // Vibrant Green
                color: '#ffffff',      // White Text
                iconColor: '#ffffff'
            });
        }
        if (errorMessage) {
            const sound = document.getElementById('errorSound');
            if (sound) sound.play().catch(e => console.log('Audio play failed:', e));
            Toast.fire({ 
                icon: 'error', 
                title: 'Gagal', 
                text: errorMessage,
                background: '#ef4444', // Vibrant Red
                color: '#ffffff',      // White Text
                iconColor: '#ffffff'
            });
        }

        function toggleSubmenu(id, btn) {
            const sidebar = document.getElementById('mainSidebar');
            // If sidebar is collapsed, expand it first
            if (sidebar.classList.contains('sidebar-collapsed')) {
                toggleCollapse();
            }
            
            const el = document.getElementById(id);
            const arrow = document.getElementById('arrow' + id.replace('submenu', ''));
            const isHidden = el.classList.toggle('hidden');
            if (arrow) arrow.classList.toggle('rotate-180');

            // Persist the state
            const openSubmenus = JSON.parse(localStorage.getItem('openSubmenus') || '[]');
            if (!isHidden) {
                if (!openSubmenus.includes(id)) openSubmenus.push(id);
            } else {
                const index = openSubmenus.indexOf(id);
                if (index > -1) openSubmenus.splice(index, 1);
            }
            localStorage.setItem('openSubmenus', JSON.stringify(openSubmenus));
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('mainSidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const isHidden = sidebar.classList.contains('-translate-x-full');
            
            if (isHidden) {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.remove('opacity-100');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        function toggleNotif() {
            const panel = document.getElementById('notifPanel');
            panel.classList.toggle('hidden');
        }

        function toggleCollapse() {
            const sidebar = document.getElementById('mainSidebar');
            const main = document.getElementById('mainContent');
            const icon = document.getElementById('collapseIcon');
            const btnText = document.querySelector('.sidebar-text.ml-1');
            
            sidebar.classList.toggle('sidebar-collapsed');
            main.classList.toggle('main-expanded');
            
            const isCollapsed = sidebar.classList.contains('sidebar-collapsed');
            localStorage.setItem('sidebarCollapsed', isCollapsed);
            
            if (isCollapsed) {
                icon.classList.replace('fa-indent', 'fa-outdent');
                btnText.innerText = "Buka";
            } else {
                icon.classList.replace('fa-outdent', 'fa-indent');
                btnText.innerText = "Tutup Menu";
            }
        }

        // Global Search Logic
        const searchInput = document.getElementById('globalSearchInput');
        const searchPanel = document.getElementById('searchResultPanel');
        const searchList = document.getElementById('searchResultsList');
        let selectedIndex = -1;

        searchInput.addEventListener('input', debounce(async (e) => {
            const query = e.target.value.trim();
            if (query.length < 2) {
                searchPanel.classList.add('hidden');
                return;
            }

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                renderResults(data);
            } catch (err) {
                console.error('Search failed:', err);
            }
        }, 300));

        searchInput.addEventListener('keydown', (e) => {
            const items = searchList.querySelectorAll('.search-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                updateSelection(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, -1);
                updateSelection(items);
            } else if (e.key === 'Enter' && selectedIndex >= 0) {
                e.preventDefault();
                items[selectedIndex].click();
            } else if (e.key === 'Escape') {
                searchPanel.classList.add('hidden');
                searchInput.blur();
            }
        });

        // Shortcut Ctrl+K or Cmd+K
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        });

        function renderResults(data) {
            if (data.length === 0) {
                searchList.innerHTML = '<div class="p-4 text-center text-gray-400 text-xs italic">Tidak ada hasil ditemukan</div>';
            } else {
                searchList.innerHTML = data.map((item, idx) => `
                    <a href="${item.url}" class="search-item flex items-center p-4 hover:bg-blue-50 transition-colors border-b border-gray-50 last:border-0 group">
                        <div class="h-10 w-10 rounded-xl bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-white group-hover:text-blue-600 transition-all">
                            <i class="${item.icon}"></i>
                        </div>
                        <div class="ml-4">
                            <div class="text-sm font-black text-gray-900">${item.title}</div>
                            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${item.subtitle}</div>
                        </div>
                        <div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fas fa-chevron-right text-blue-300 text-xs"></i>
                        </div>
                    </a>
                `).join('');
            }
            searchPanel.classList.remove('hidden');
            selectedIndex = -1;
        }

        function updateSelection(items) {
            items.forEach((item, idx) => {
                if (idx === selectedIndex) {
                    item.classList.add('bg-blue-50', 'ring-2', 'ring-blue-100', 'ring-inset');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('bg-blue-50', 'ring-2', 'ring-blue-100', 'ring-inset');
                }
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // Close search on click outside
        window.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchPanel.contains(e.target)) {
                searchPanel.classList.add('hidden');
            }
        });

        // Close dropdown when clicking outside
        window.onclick = function(event) {
            const panel = document.getElementById('notifPanel');
            const dropdown = document.getElementById('notifDropdown');
            if (panel && !dropdown.contains(event.target)) {
                panel.classList.add('hidden');
            }
        }

        // Auto-open submenu if on relevant page
        function restoreSidebarState() {
            // Restore Sidebar State
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                toggleCollapse();
            }

            // Restore Open Submenus from LocalStorage
            const openSubmenus = JSON.parse(localStorage.getItem('openSubmenus') || '[]');
            openSubmenus.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove('hidden');
                    const menuId = id.replace('submenu', '');
                    const arrow = document.getElementById('arrow' + menuId);
                    if (arrow) arrow.classList.add('rotate-180');
                    const parentBtn = document.querySelector(`[data-target-id="${id}"]`);
                    if (parentBtn) {
                        parentBtn.classList.add('bg-blue-50', 'text-blue-600');
                    }
                }
            });

            // Restore Sidebar Scroll Position
            const sidebarNav = document.getElementById('sidebarNav');
            if (sidebarNav) {
                const savedScroll = localStorage.getItem('sidebarScrollTop');
                if (savedScroll) {
                    sidebarNav.scrollTop = parseInt(savedScroll, 10);
                }
                
                // Save scroll position when it changes
                sidebarNav.addEventListener('scroll', () => {
                    localStorage.setItem('sidebarScrollTop', sidebarNav.scrollTop);
                });
            }
        }

        // Run state restoration as soon as DOM is ready to prevent flicker
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', restoreSidebarState);
        } else {
            restoreSidebarState();
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('login') === 'success') {
                const sound = document.getElementById('successSound');
                if (sound) sound.play().catch(e => console.log('Audio play failed:', e));
                
                // Clean URL
                const nextURL = window.location.href.split('?')[0];
                window.history.replaceState({}, document.title, nextURL);
            }

            const path = window.location.pathname;
            
            // Intelligent Submenu Picker: Find link that matches current path
            const allLinks = document.querySelectorAll('aside nav a');
            allLinks.forEach(link => {
                const href = link.getAttribute('href');
                // Support exact match or match with trailing slash
                if (href && (path === href || path === href + '/' || href === path + '/')) {
                    // Mark link as active
                    link.classList.add('bg-blue-50/50', 'text-blue-600', 'font-black');
                    
                    // If this link is inside a submenu, open the parent submenu
                    const submenuWrapper = link.closest('div[id^="submenu"]');
                    if (submenuWrapper) {
                        submenuWrapper.classList.remove('hidden');
                        const menuId = submenuWrapper.id.replace('submenu', '');
                        const arrow = document.getElementById('arrow' + menuId);
                        if (arrow) arrow.classList.add('rotate-180');
                        
                        // Also style the parent button of this submenu
                        const parentBtn = document.querySelector(`[data-target-id="${submenuWrapper.id}"]`);
                        if (parentBtn) {
                            parentBtn.classList.add('bg-blue-50', 'text-blue-600');
                        }
                    }
                }
            });
        };
    </script>
</body>
</html>
