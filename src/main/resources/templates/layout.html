<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Bintang</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(229, 231, 235, 1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Sidebar -->
    <aside class="fixed inset-y-0 left-0 w-64 glass-sidebar hidden lg:block z-50">
        <div class="px-6 py-8">
            <h1 class="text-2xl font-bold text-blue-600 flex items-center">
                <i class="fas fa-users-cog mr-2"></i> HRMS
            </h1>
        </div>
        
        <nav class="p-4 space-y-2">
            <div th:each="wrapper : ${sidebarMenus}" class="relative group">
                <!-- If has children: Dropdown -->
                <div th:if="${not #lists.isEmpty(wrapper.children)}" class="relative">
                    <button th:onclick="'toggleSubmenu(\'submenu' + ${wrapper.menu.id} + '\')'" 
                            class="w-full flex items-center justify-between px-4 py-3 text-sm font-medium rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-all">
                        <span class="flex items-center">
                            <i th:class="${wrapper.menu.icon != null ? wrapper.menu.icon : 'fas fa-circle text-[6px]'} + ' w-6'"></i>
                            <span th:text="${wrapper.menu.title}">Title</span>
                        </span>
                        <i class="fas fa-chevron-down text-[10px] transition-transform duration-300" th:id="'arrow' + ${wrapper.menu.id}"></i>
                    </button>
                    <div th:id="'submenu' + ${wrapper.menu.id}" class="pl-10 mt-1 space-y-1 hidden">
                        <a th:each="child : ${wrapper.children}" 
                           th:href="@{${child.url}}" 
                           class="block py-2 text-xs font-medium text-gray-500 hover:text-blue-600 transition-colors"
                           th:text="${child.title}">Child</a>
                    </div>
                </div>
                
                <!-- If NO children: Standard link -->
                <a th:if="${#lists.isEmpty(wrapper.children)}" 
                   th:href="@{${wrapper.menu.url}}" 
                   class="flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition-all">
                    <i th:class="${wrapper.menu.icon != null ? wrapper.menu.icon : 'fas fa-circle text-[6px]'} + ' w-6'"></i>
                    <span th:text="${wrapper.menu.title}">Title</span>
                </a>
            </div>
        </nav>

        <!-- Logout at Bottom of Sidebar -->
        <div class="absolute bottom-0 w-64 p-4 border-t border-gray-100 bg-white">
            <a th:href="@{/logout}" class="flex items-center px-4 py-3 text-sm font-bold rounded-xl text-red-500 hover:bg-red-50 transition-all">
                <i class="fas fa-sign-out-alt w-6"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="lg:ml-64 min-h-screen">
        <!-- Top Bar -->
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-40">
            <button class="lg:hidden text-gray-500 hover:text-gray-700">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="relative w-96 hidden md:block">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-gray-50 placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Cari data...">
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-gray-500 hover:text-gray-700 relative">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-400 ring-2 ring-white"></span>
                </button>
                <a th:href="@{/logout}" class="flex items-center space-x-2 group">
                    <div class="h-8 w-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold group-hover:bg-blue-600 transition-colors">
                        <span th:text="${nik != null ? #strings.substring(nik, 0, 1) : 'U'}">B</span>
                    </div>
                    <span class="text-xs font-semibold text-gray-500 group-hover:text-red-500 transition-colors">Logout</span>
                </a>
            </div>
        </header>

        <!-- Content Area -->
        <div class="p-8">
            <div th:replace="~{__${content}__ :: area_konten}">
                <!-- Dynamic Content Here -->
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        function toggleSubmenu(id) {
            const el = document.getElementById(id);
            const arrow = document.getElementById('arrow' + id.replace('submenu', ''));
            el.classList.toggle('hidden');
            if (arrow) arrow.classList.toggle('rotate-180');
        }

        // Auto-open submenu if on relevant page
        window.onload = function() {
            const path = window.location.pathname;
            if (path.includes('/master-data/')) {
                document.getElementById('submenuMaster').classList.remove('hidden');
                document.getElementById('arrowMaster').classList.add('rotate-180');
            }
        };
    </script>
</body>
</html>
