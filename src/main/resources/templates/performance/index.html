<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Performance Evaluation</h2>
                <p class="text-gray-500">Pantau dan beri penilaian terhadap kinerja karyawan.</p>
            </div>
            <button onclick="openModal('modalPerformance')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition-all">
                Beri Penilaian Baru
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="eval : ${evaluations}" class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                <div class="flex justify-between items-start mb-4">
                    <div class="h-12 w-12 rounded-xl bg-purple-100 flex items-center justify-center text-purple-600 font-bold text-xl" 
                         th:text="${eval.score}"></div>
                    <span class="text-xs font-semibold text-gray-400" th:text="${eval.period}"></span>
                </div>
                <h3 class="font-bold text-gray-800 mb-1" th:text="'Karyawan ID: ' + ${eval.employeeId}"></h3>
                <p class="text-sm text-gray-500 mb-4" th:text="${eval.comments}"></p>
                <div class="pt-4 border-t border-gray-50 flex justify-between items-center text-xs text-gray-400">
                    <span th:text="${#temporals.format(eval.reviewDate, 'dd MMM yyyy')}"></span>
                    <span th:text="'Penilai: ' + ${eval.evaluatorId}"></span>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(evaluations)}" class="col-span-3 py-20 text-center text-gray-400 italic">
                Belum ada data penilaian kinerja.
            </div>
        </div>

        <!-- Modal Performance -->
        <div id="modalPerformance" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
            <div class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
                <h3 class="text-2xl font-bold mb-6">Penilaian Kinerja</h3>
                <form th:action="@{/performance}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Karyawan</label>
                        <select name="employeeId" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                            <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.firstName + ' ' + e.lastName}"></option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Skor (1-100)</label>
                            <input type="number" name="score" min="1" max="100" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Periode</label>
                            <input type="text" name="period" placeholder="e.g. Q1-2026" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Komentar / Feedback</label>
                        <textarea name="comments" rows="3" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Penilai (ID)</label>
                        <input type="number" name="evaluatorId" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                    </div>
                    <div class="flex justify-end space-x-4 pt-6">
                        <button type="button" onclick="closeModal('modalPerformance')" class="text-gray-500 font-medium">Batal</button>
                        <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
