<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-10 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Penilaian Kinerja</h2>
                <p class="text-gray-500">Evaluasi dan tinjauan performa berkala karyawan.</p>
            </div>
            <button onclick="openModal('modalPerformance')" 
                    class="bg-blue-600 text-white px-8 py-4 rounded-3xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">
                + Input Penilaian
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div th:each="eval : ${evaluations}" 
                 class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 hover:shadow-xl hover:shadow-gray-100 transition-all group">
                <div class="flex justify-between items-start mb-6">
                    <div class="h-14 w-14 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center font-black text-xl" 
                         th:text="${#strings.substring(eval.employeeId.toString(),0,1)}"></div>
                    <div class="text-right">
                        <span class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Skor Akhir</span>
                        <span th:class="${eval.score >= 80 ? 'text-green-600' : (eval.score >= 60 ? 'text-amber-600' : 'text-red-600')} + ' text-3xl font-black'"
                              th:text="${eval.score}"></span>
                    </div>
                </div>
                
                <h4 class="text-lg font-black text-gray-900 mb-1" th:text="'Karyawan ID: ' + ${eval.employeeId}"></h4>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4" th:text="'Periode: ' + ${eval.period}"></p>
                
                <p class="text-gray-600 text-sm italic mb-6 line-clamp-3" th:text="'&quot;' + ${eval.comments} + '&quot;'"></p>
                
                <div class="pt-6 border-t border-gray-50 flex justify-between items-center text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                    <span th:text="${#temporals.format(eval.reviewDate, 'dd MMM yyyy')}"></span>
                    <span th:text="'Penilai: ' + ${eval.evaluatorId}"></span>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(evaluations)}" class="col-span-full py-20 text-center text-gray-400 italic">
                Belum ada data penilaian kinerja.
            </div>
        </div>

        <!-- Modal Performance -->
        <div id="modalPerformance" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-sm shadow-2xl relative border border-white max-h-[90vh] overflow-hidden flex flex-col">
                <!-- Sticky Close Button -->
                <button type="button" onclick="closeModal('modalPerformance')" 
                        class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-all z-[120] p-2 hover:bg-gray-50 rounded-full">
                    <i class="fas fa-times text-xl"></i>
                </button>

                <div class="p-10 overflow-y-auto custom-scrollbar">
                    <h3 class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Input Penilaian</h3>
                    <form id="formPerformance" th:action="@{/performance}" method="post" class="space-y-6">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Karyawan</label>
                            <select name="employeeId" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100 appearance-none">
                                <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.firstName + ' ' + e.lastName}"></option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Skor (1-100)</label>
                                <input type="number" name="score" min="1" max="100" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Periode</label>
                                <input type="text" name="period" placeholder="e.g. Q1-2026" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Komentar / Feedback</label>
                            <textarea name="comments" rows="3" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100"></textarea>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Penilai (ID)</label>
                            <input type="number" name="evaluatorId" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100">
                        </div>
                        <div class="flex justify-end space-x-4 pt-6">
                            <button type="button" onclick="closeModal('modalPerformance')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                            <button type="button" onclick="submitPerformanceForm()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                                SIMPAN
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Escape Key Listener
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal('modalPerformance');
        });

        function submitPerformanceForm() {
            confirmAction('formPerformance', 'Simpan Penilaian?', 'Data evaluasi kinerja karyawan akan disimpan secara permanen.', 'question');
        }
    </script>
</body>
</html>
