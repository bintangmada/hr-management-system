<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Payroll Management</h2>
                <p class="text-gray-500">Kelola penggajian dan riwayat pembayaran karyawan.</p>
            </div>
            <button onclick="openModal('modalPayroll')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition-all">
                Generate Slip Gaji
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Karyawan ID</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Periode</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Gaji Pokok</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Net Salary</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Status</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="p : ${payrolls}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${p.employeeId}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${p.period}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="'Rp ' + ${#numbers.formatDecimal(p.basicSalary, 0, 'COMMA', 0, 'POINT')}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-blue-600" th:text="'Rp ' + ${#numbers.formatDecimal(p.netSalary, 0, 'COMMA', 0, 'POINT')}"></td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-1 text-xs font-medium bg-green-100 text-green-700 rounded-full" th:text="${p.status}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(payrolls)}">
                        <td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">Belum ada riwayat payroll.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Payroll -->
        <div id="modalPayroll" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
            <div class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
                <h3 class="text-2xl font-bold mb-6">Generate Payroll</h3>
                <form th:action="@{/payroll}" method="post" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Pilih Karyawan</label>
                        <select name="employeeId" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                            <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.firstName + ' ' + e.lastName}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Periode</label>
                        <input type="month" name="period" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Gaji Pokok</label>
                        <input type="number" name="basicSalary" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Tunjangan</label>
                            <input type="number" name="allowances" value="0" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Potongan</label>
                            <input type="number" name="deductions" value="0" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Status</label>
                        <select name="status" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                            <option value="PAID">PAID</option>
                            <option value="PENDING">PENDING</option>
                        </select>
                    </div>
                    <div class="flex justify-end space-x-4 pt-6">
                        <button type="button" onclick="closeModal('modalPayroll')" class="text-gray-500 font-medium">Batal</button>
                        <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
