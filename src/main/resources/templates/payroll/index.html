<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Payroll Management</h2>
                <p class="text-gray-500">Kelola penggajian dan riwayat pembayaran karyawan.</p>
            </div>
            <button onclick="openModal('modalPayroll')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95">
                Generate Slip Gaji
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Karyawan ID</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Periode</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Gaji Pokok</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Net Salary</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Status</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-100">
                    <tr th:each="p : ${payrolls}" class="hover:bg-blue-50/30 transition-colors text-sm">
                        <td class="px-8 py-5 font-mono font-bold text-blue-600" th:text="${p.employeeId}"></td>
                        <td class="px-8 py-5 text-gray-600" th:text="${p.period}"></td>
                        <td class="px-8 py-5 text-gray-600" th:text="'Rp ' + ${#numbers.formatDecimal(p.basicSalary, 0, 'COMMA', 0, 'POINT')}"></td>
                        <td class="px-8 py-5 font-black text-gray-900" th:text="'Rp ' + ${#numbers.formatDecimal(p.netSalary, 0, 'COMMA', 0, 'POINT')}"></td>
                        <td class="px-8 py-5">
                            <span th:class="${p.status == 'PAID' ? 'bg-green-50 text-green-600' : 'bg-amber-50 text-amber-600'} + ' px-3 py-1 rounded-full text-[10px] font-black uppercase'" 
                                  th:text="${p.status}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(payrolls)}">
                        <td colspan="5" class="px-8 py-10 text-center text-gray-400 italic">Belum ada riwayat payroll.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Payroll -->
        <div id="modalPayroll" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-sm shadow-2xl relative border border-white max-h-[90vh] overflow-hidden flex flex-col">
                <!-- Sticky Close Button -->
                <button type="button" onclick="closeModal('modalPayroll')" 
                        class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-all z-[120] p-2 hover:bg-gray-50 rounded-full">
                    <i class="fas fa-times text-xl"></i>
                </button>

                <div class="p-10 overflow-y-auto custom-scrollbar">
                    <h3 class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Generate Payroll</h3>
                    <form id="formPayroll" th:action="@{/payroll}" method="post" class="space-y-6">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Pilih Karyawan</label>
                            <select name="employeeId" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100 appearance-none">
                                <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.firstName + ' ' + e.lastName}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Periode</label>
                            <input type="month" name="period" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Gaji Pokok</label>
                            <input type="number" name="basicSalary" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Tunjangan</label>
                                <input type="number" name="allowances" value="0" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Potongan</label>
                                <input type="number" name="deductions" value="0" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Status</label>
                            <select name="status" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100 appearance-none">
                                <option value="PAID">PAID</option>
                                <option value="PENDING">PENDING</option>
                            </select>
                        </div>
                        <div class="flex justify-end space-x-4 pt-6">
                            <button type="button" onclick="closeModal('modalPayroll')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                            <button type="button" onclick="submitPayrollForm()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                                GENERATE
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Escape Key Listener
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal('modalPayroll');
        });

        function submitPayrollForm() {
            confirmAction('formPayroll', 'Generate Payroll?', 'Data penggajian akan disimpan dan slip gaji akan dibuat.', 'question');
        }
    </script>
</body>
</html>
