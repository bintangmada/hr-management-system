<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Manajemen Menu</h2>
                <p class="text-gray-500">Atur navigasi sidebar secara dinamis.</p>
            </div>
            <button onclick="prepareMenuModal('modalMenu', 'add')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                + Tambah Menu
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200" id="menuTable">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Urutan</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Judul Menu</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">URL</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Role</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Akses Spesifik</th>
                        <th class="px-8 py-5 text-right text-xs font-black text-gray-400 uppercase tracking-widest">Aksi</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-100">
                    <tr th:each="m : ${menus}" class="hover:bg-blue-50/30 transition-colors">
                        <td class="px-8 py-5 text-xs font-bold text-gray-400" th:text="${m.sortOrder}"></td>
                        <td class="px-8 py-5 font-bold text-gray-800">
                            <span class="flex items-center">
                                <i th:class="${m.icon != null ? m.icon : 'fas fa-circle text-[4px]'} + ' mr-3 text-blue-500'"></i>
                                <span th:text="${m.title}">Title</span>
                            </span>
                        </td>
                        <td class="px-8 py-5 text-gray-500 font-mono text-xs" th:text="${m.url}"></td>
                        <td class="px-8 py-5">
                            <span th:class="${m.roleRequired == 'ADMIN' ? 'bg-red-50 text-red-600' : (m.roleRequired == 'EMPLOYEE' ? 'bg-blue-50 text-blue-600' : 'bg-green-50 text-green-600')} + ' px-3 py-1 rounded-full text-[10px] font-black uppercase'"
                                  th:text="${m.roleRequired}">ADMIN</span>
                        </td>
                        <td class="px-8 py-5 text-gray-400 text-[10px] font-mono italic" th:text="${m.permittedNiks != null && m.permittedNiks != '' ? m.permittedNiks : '-'}"></td>
                        <td class="px-8 py-5 text-right space-x-3 text-sm">
                            <button class="text-blue-600 hover:underline font-bold" 
                                    th:data-id="${m.id}"
                                    th:data-title="${m.title}"
                                    th:data-sort="${m.sortOrder}"
                                    th:data-url="${m.url}"
                                    th:data-icon="${m.icon}"
                                    th:data-role="${m.roleRequired}"
                                    th:data-parent="${m.parentId}"
                                    th:data-permitted="${m.permittedNiks}"
                                    onclick="prepareMenuModalByBtn(this, 'detail')">Detail</button>
                            <button class="text-amber-600 hover:underline font-bold" 
                                    th:data-id="${m.id}"
                                    th:data-title="${m.title}"
                                    th:data-sort="${m.sortOrder}"
                                    th:data-url="${m.url}"
                                    th:data-icon="${m.icon}"
                                    th:data-role="${m.roleRequired}"
                                    th:data-parent="${m.parentId}"
                                    th:data-permitted="${m.permittedNiks}"
                                    onclick="prepareMenuModalByBtn(this, 'edit')">Edit</button>
                            <form th:id="'deleteForm' + ${m.id}" th:action="@{/settings/menu-management/delete/{id}(id=${m.id})}" method="post" class="inline">
                                <button type="button" class="text-red-500 hover:underline font-bold" 
                                        th:onclick="'confirmAction(\'deleteForm' + ${m.id} + '\', \'Hapus Menu?\', \'Data menu ini akan dihapus permanen.\', \'error\')'">Hapus</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Menu -->
        <div id="modalMenu" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl border border-white max-h-[90vh] overflow-hidden flex flex-col relative">
                <!-- Close Button (Stay visible on top right of the box) -->
                <button type="button" onclick="closeModal('modalMenu')" 
                        class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-all z-[120] p-2 hover:bg-gray-50 rounded-full">
                    <i class="fas fa-times text-2xl"></i>
                </button>

                <div class="p-10 overflow-y-auto custom-scrollbar">
                    <h3 id="modalTitle" class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Atur Menu</h3>
                    <form id="formMenu" th:action="@{/settings/menu-management}" method="post" class="space-y-6">
                        <input type="hidden" name="id" id="menuId">
                        <input type="hidden" name="permittedNiks" id="menuPermittedHidden">
                        
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Judul Menu</label>
                                <input type="text" name="title" id="menuTitle" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl focus:ring-4 focus:ring-blue-100 outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Urutan (Sort)</label>
                                <input type="number" name="sortOrder" id="menuSort" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">URL / Link</label>
                            <input type="text" name="url" id="menuUrl" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl font-mono text-sm">
                        </div>
                        
                        <!-- ICON SECTION WITH GALLERY -->
                        <div class="grid grid-cols-1 gap-4">
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Icon (FontAwesome)</label>
                            <div class="flex space-x-3">
                                <div class="relative flex-grow">
                                    <i id="iconPreview" class="fas fa-circle absolute left-5 top-1/2 -translate-y-1/2 text-blue-500 text-sm"></i>
                                    <input type="text" name="icon" id="menuIcon" 
                                           oninput="updateIconPreview(this.value)"
                                           placeholder="fas fa-home" class="w-full pl-12 pr-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl font-mono text-sm">
                                </div>
                                <button type="button" onclick="toggleIconGallery()" 
                                        class="px-6 py-5 bg-blue-50 text-blue-600 rounded-3xl font-bold hover:bg-blue-100 transition-all text-xs">
                                    <i class="fas fa-icons mr-2"></i> Pilih Icon
                                </button>
                            </div>

                            <!-- Icon Gallery Container -->
                            <div id="iconGallery" class="hidden bg-gray-50 p-6 rounded-[2rem] border border-gray-100">
                                <div class="flex justify-between items-center mb-4">
                                    <p class="text-[10px] font-black text-gray-400 uppercase">Galeri Icon Populer</p>
                                    <input type="text" id="iconSearchInput" onkeyup="filterIcons()" placeholder="Cari icon..." 
                                           class="px-4 py-2 bg-white border border-gray-100 rounded-xl text-[10px] outline-none focus:ring-2 focus:ring-blue-100">
                                </div>
                                <div id="iconGrid" class="grid grid-cols-6 gap-2 max-h-48 overflow-y-auto custom-scrollbar p-2 bg-white rounded-2xl border border-gray-100">
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Role Akses</label>
                            <select name="roleRequired" id="menuRole" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl appearance-none">
                                <option value="ALL">Semua User</option>
                                <option value="ADMIN">Admin Saja</option>
                                <option value="EMPLOYEE">Karyawan Saja</option>
                            </select>
                        </div>

                        <!-- CHECKBOX USER SELECTION -->
                        <div class="bg-gray-50 p-8 rounded-[2rem] border border-gray-100">
                            <div class="flex justify-between items-center mb-4">
                                <label class="block text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1">Pilih User Spesifik (Opsional)</label>
                                <div class="flex space-x-4 text-[10px] font-bold">
                                    <button type="button" onclick="selectAllUsers(true)" class="text-blue-600 hover:underline">Centang Semua</button>
                                    <span class="text-gray-300">|</span>
                                    <button type="button" onclick="selectAllUsers(false)" class="text-red-500 hover:underline">Hapus Semua</button>
                                </div>
                            </div>
                            
                            <div class="relative mb-4">
                                <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                                <input type="text" id="employeeSearch" onkeyup="filterEmployeeChecklist()" placeholder="Cari Nama atau NIK..." 
                                       class="w-full pl-12 pr-6 py-4 bg-white border border-gray-100 rounded-2xl text-xs focus:ring-4 focus:ring-blue-50 outline-none">
                            </div>

                            <div class="max-h-56 overflow-y-auto px-2 space-y-1 custom-scrollbar">
                                <div th:each="emp : ${employees}" class="employee-item flex items-center p-3 hover:bg-white rounded-xl transition-colors group cursor-pointer"
                                     th:data-nik="${emp.nik}"
                                     onclick="toggleEmployeeCheckbox('chk' + this.getAttribute('data-nik'))">
                                    <input type="checkbox" th:id="'chk' + ${emp.nik}" th:value="${emp.nik}" class="employee-checkbox w-5 h-5 rounded-lg text-blue-600 focus:ring-blue-500 border-gray-200 cursor-pointer" onclick="event.stopPropagation()">
                                    <div class="h-8 w-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold ml-4 scale-90">
                                        <i class="fas fa-user text-[10px]"></i>
                                    </div>
                                    <div class="ml-3">
                                        <p class="text-xs font-black text-gray-800 leading-tight" th:text="${emp.firstName + ' ' + emp.lastName}">Name</p>
                                        <p class="text-[10px] text-gray-400 font-mono" th:text="${emp.nik}">NIK</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Parent (Menu Induk)</label>
                            <select name="parentId" id="menuParent" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl appearance-none">
                                <option value="0">--- Tidak Ada (Menu Utama) ---</option>
                                <option th:each="p : ${parentMenus}" th:value="${p.id}" th:text="${p.title}"></option>
                            </select>
                        </div>
                        <div class="flex justify-end space-x-4 pt-4">
                            <button type="button" onclick="closeModal('modalMenu')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                            <button type="button" onclick="submitMenuForm()" id="btnSubmit" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                                SIMPAN MENU
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        .icon-item:hover { background-color: #eff6ff; color: #2563eb; }
    </style>

    <script th:inline="javascript">
        // --- CONSTANTS & DATA ---
        const COMMON_ICONS = [
            "fas fa-home", "fas fa-chart-line", "fas fa-user-friends", "fas fa-money-check-alt", "fas fa-star",
            "fas fa-database", "fas fa-map-marked-alt", "fas fa-history", "fas fa-list-ul", "fas fa-user-shield",
            "fas fa-fingerprint", "fas fa-calendar-alt", "fas fa-file-invoice", "fas fa-briefcase", "fas fa-building",
            "fas fa-cog", "fas fa-bell", "fas fa-search", "fas fa-plus", "fas fa-edit", "fas fa-trash",
            "fas fa-check-circle", "fas fa-info-circle", "fas fa-exclamation-triangle", "fas fa-envelope", "fas fa-phone",
            "fas fa-globe", "fas fa-lock", "fas fa-key", "fas fa-user-tie", "fas fa-id-card", "fas fa-wallet",
            "fas fa-university", "fas fa-tasks", "fas fa-print", "fas fa-download", "fas fa-upload", "fas fa-share-alt"
        ];

        // --- ICON PICKER LOGIC ---
        function generateIconGrid() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';
            COMMON_ICONS.forEach(icon => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'icon-item p-3 flex flex-center rounded-xl transition-all border border-transparent';
                btn.title = icon;
                btn.innerHTML = `<i class="${icon} text-lg"></i>`;
                btn.onclick = () => selectIcon(icon);
                grid.appendChild(btn);
            });
        }

        function toggleIconGallery() {
            document.getElementById('iconGallery').classList.toggle('hidden');
        }

        function filterIcons() {
            const search = document.getElementById('iconSearchInput').value.toLowerCase();
            const items = document.querySelectorAll('.icon-item');
            items.forEach(item => {
                const iconClass = item.title.toLowerCase();
                item.style.display = iconClass.includes(search) ? 'flex' : 'none';
            });
        }

        function selectIcon(icon) {
            document.getElementById('menuIcon').value = icon;
            updateIconPreview(icon);
            document.getElementById('iconGallery').classList.add('hidden');
        }

        function updateIconPreview(val) {
            document.getElementById('iconPreview').className = (val || 'fas fa-circle') + ' absolute left-5 top-1/2 -translate-y-1/2 text-blue-500 text-sm';
        }

        // --- OTHER LOGIC ---
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Escape Key Listener
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal('modalMenu');
            }
        });

        function filterEmployeeChecklist() {
            const search = document.getElementById('employeeSearch').value.toLowerCase();
            const items = document.querySelectorAll('.employee-item');
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(search) ? 'flex' : 'none';
            });
        }

        function toggleEmployeeCheckbox(id) {
            const chk = document.getElementById(id);
            chk.checked = !chk.checked;
        }

        function selectAllUsers(checked) {
            document.querySelectorAll('.employee-checkbox').forEach(chk => {
                if (chk.closest('.employee-item').style.display !== 'none') {
                    chk.checked = checked;
                }
            });
        }

        function syncPermittedNiks() {
            const checkedNiks = Array.from(document.querySelectorAll('.employee-checkbox:checked'))
                                     .map(chk => chk.value)
                                     .join(',');
            document.getElementById('menuPermittedHidden').value = checkedNiks;
        }

        function submitMenuForm() {
            syncPermittedNiks();
            const isEdit = document.getElementById('menuId').value !== '';
            confirmAction('formMenu', 
                isEdit ? 'Ubah Menu?' : 'Tambah Menu?', 
                isEdit ? 'Perubahan pada menu ini akan disimpan.' : 'Menu baru akan ditambahkan ke sidebar.',
                'question');
        }

        function prepareMenuModalByBtn(btn, mode) {
            const data = {
                id: btn.getAttribute('data-id'),
                title: btn.getAttribute('data-title'),
                sortOrder: btn.getAttribute('data-sort'),
                url: btn.getAttribute('data-url'),
                icon: btn.getAttribute('data-icon'),
                roleRequired: btn.getAttribute('data-role'),
                parentId: btn.getAttribute('data-parent'),
                permittedNiks: btn.getAttribute('data-permitted')
            };
            prepareMenuModal('modalMenu', mode, data);
        }

        function prepareMenuModal(modalId, mode, data) {
            const modal = document.getElementById(modalId);
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('btnSubmit');
            const form = modal.querySelector('form');
            const inputs = form.querySelectorAll('input:not(.employee-checkbox), select');
            const checkboxes = document.querySelectorAll('.employee-checkbox');

            form.reset();
            document.getElementById('employeeSearch').value = '';
            document.getElementById('iconSearchInput').value = '';
            document.getElementById('iconGallery').classList.add('hidden');
            filterEmployeeChecklist();
            filterIcons();
            
            checkboxes.forEach(chk => {
                chk.checked = false;
                chk.disabled = (mode === 'detail');
            });

            inputs.forEach(i => {
                i.disabled = (mode === 'detail');
                i.classList.remove('bg-gray-100');
                if (mode === 'detail') i.classList.add('bg-gray-100');
            });

            if (submitBtn) submitBtn.style.display = (mode === 'detail' ? 'none' : 'block');

            if (mode === 'add') {
                title.innerText = 'Tambah Menu Baru';
                document.getElementById('menuId').value = '';
                document.getElementById('menuPermittedHidden').value = '';
                updateIconPreview('');
            } else {
                title.innerText = (mode === 'detail' ? 'Detail Data Menu' : 'Ubah Data Menu');
                document.getElementById('menuId').value = data.id;
                document.getElementById('menuTitle').value = data.title;
                document.getElementById('menuSort').value = data.sortOrder;
                document.getElementById('menuUrl').value = data.url;
                document.getElementById('menuIcon').value = data.icon;
                document.getElementById('menuRole').value = data.roleRequired;
                document.getElementById('menuParent').value = data.parentId || 0;
                document.getElementById('menuPermittedHidden').value = data.permittedNiks || '';
                updateIconPreview(data.icon);

                if (data.permittedNiks) {
                    const niks = data.permittedNiks.split(',');
                    niks.forEach(nik => {
                        const chk = document.getElementById('chk' + nik.trim());
                        if (chk) chk.checked = true;
                    });
                }
            }
            modal.classList.remove('hidden');
        }

        window.addEventListener('DOMContentLoaded', generateIconGrid);
    </script>
</body>
</html>
