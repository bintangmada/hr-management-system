<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Master Data</h2>
                <p class="text-gray-500">Kelola unit organisasi, wilayah, dan jabatan.</p>
            </div>
            <div th:if="${param.success}" class="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-sm font-medium">
                Data berhasil diperbarui!
            </div>
            <div th:if="${param.deleted}" class="bg-red-100 text-red-700 px-4 py-2 rounded-xl text-sm font-medium">
                Data berhasil dihapus!
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Regions -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800">Regions</h3>
                    <button onclick="prepareModal('modalRegion', 'add')" class="text-blue-600 text-sm font-bold">+ Tambah</button>
                </div>
                <table class="min-w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-50">
                            <th class="pb-3 font-medium">Nama Region</th>
                            <th class="pb-3 font-medium text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${regions}" class="border-b border-gray-50 last:border-0 hover:bg-gray-50">
                            <td class="py-3 font-medium text-gray-800" th:text="${r.name}"></td>
                            <td class="py-3 text-right space-x-2">
                                <button class="text-blue-600 hover:underline" th:onclick="prepareModal('modalRegion', 'detail', [[${r}]])">Detail</button>
                                <button class="text-amber-600 hover:underline" th:onclick="prepareModal('modalRegion', 'edit', [[${r}]])">Edit</button>
                                <form th:action="@{/settings/master-data/regions/delete/{id}(id=${r.id})}" method="post" class="inline">
                                    <button type="submit" class="text-red-500 hover:underline" onclick="return confirm('Hapus region ini?')">Hapus</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Jobs -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800">Jobs (Jabatan)</h3>
                    <button onclick="prepareModal('modalJob', 'add')" class="text-blue-600 text-sm font-bold">+ Tambah</button>
                </div>
                <table class="min-w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-50">
                            <th class="pb-3 font-medium">Jabatan</th>
                            <th class="pb-3 font-medium text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="j : ${jobs}" class="border-b border-gray-50 last:border-0 hover:bg-gray-50">
                            <td class="py-3 font-medium text-gray-800" th:text="${j.title}"></td>
                            <td class="py-3 text-right space-x-2">
                                <button class="text-blue-600 hover:underline" th:onclick="prepareModal('modalJob', 'detail', [[${j}]])">Detail</button>
                                <button class="text-amber-600 hover:underline" th:onclick="prepareModal('modalJob', 'edit', [[${j}]])">Edit</button>
                                <form th:action="@{/settings/master-data/jobs/delete/{id}(id=${j.id})}" method="post" class="inline">
                                    <button type="submit" class="text-red-500 hover:underline" onclick="return confirm('Hapus jabatan ini?')">Hapus</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Departments -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800">Departments</h3>
                    <button onclick="prepareModal('modalDept', 'add')" class="text-blue-600 text-sm font-bold">+ Tambah</button>
                </div>
                <table class="min-w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-50">
                            <th class="pb-3 font-medium">Nama Departemen</th>
                            <th class="pb-3 font-medium text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${departments}" class="border-b border-gray-50 last:border-0 hover:bg-gray-50">
                            <td class="py-3 font-medium text-gray-800" th:text="${d.name}"></td>
                            <td class="py-3 text-right space-x-2">
                                <button class="text-blue-600 hover:underline" th:onclick="prepareModal('modalDept', 'detail', [[${d}]])">Detail</button>
                                <button class="text-amber-600 hover:underline" th:onclick="prepareModal('modalDept', 'edit', [[${d}]])">Edit</button>
                                <form th:action="@{/settings/master-data/departments/delete/{id}(id=${d.id})}" method="post" class="inline">
                                    <button type="submit" class="text-red-500 hover:underline" onclick="return confirm('Hapus departemen ini?')">Hapus</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Locations -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800">Locations (Cabang)</h3>
                    <button onclick="prepareModal('modalLoc', 'add')" class="text-blue-600 text-sm font-bold">+ Tambah</button>
                </div>
                <table class="min-w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-50">
                            <th class="pb-3 font-medium">Kota</th>
                            <th class="pb-3 font-medium text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="l : ${locations}" class="border-b border-gray-50 last:border-0 hover:bg-gray-50">
                            <td class="py-3 font-medium text-gray-800" th:text="${l.city}"></td>
                            <td class="py-3 text-right space-x-2">
                                <button class="text-blue-600 hover:underline" th:onclick="prepareModal('modalLoc', 'detail', [[${l}]])">Detail</button>
                                <button class="text-amber-600 hover:underline" th:onclick="prepareModal('modalLoc', 'edit', [[${l}]])">Edit</button>
                                <form th:action="@{/settings/master-data/locations/delete/{id}(id=${l.id})}" method="post" class="inline">
                                    <button type="submit" class="text-red-500 hover:underline" onclick="return confirm('Hapus lokasi ini?')">Hapus</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- MODALS -->
        <!-- Modal Region -->
        <div id="modalRegion" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                <h3 id="modalRegionTitle" class="text-2xl font-bold mb-6">Region</h3>
                <form th:action="@{/settings/master-data/regions}" method="post">
                    <input type="hidden" name="id" id="regionId">
                    <div class="mb-6">
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Nama Region</label>
                        <input type="text" name="name" id="regionName" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-100 transition-all outline-none">
                    </div>
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="closeModal('modalRegion')" class="text-gray-500 font-bold px-4">Batal</button>
                        <button type="submit" id="regionSubmit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal Job -->
        <div id="modalJob" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
                <h3 id="modalJobTitle" class="text-2xl font-bold mb-6">Jabatan</h3>
                <form th:action="@{/settings/master-data/jobs}" method="post">
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">ID Jabatan (Kode)</label>
                        <input type="text" name="id" id="jobId" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl font-mono text-sm">
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Nama Jabatan</label>
                        <input type="text" name="title" id="jobTitle" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Gaji Minimal</label>
                            <input type="number" name="minSalary" id="jobMinSalary" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Gaji Maksimal</label>
                            <input type="number" name="maxSalary" id="jobMaxSalary" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                    </div>
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="closeModal('modalJob')" class="text-gray-500 font-bold px-4">Batal</button>
                        <button type="submit" id="jobSubmit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal Location (Organizational) -->
        <div id="modalLoc" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl">
                <h3 id="modalLocTitle" class="text-2xl font-bold mb-6">Lokasi Cabang</h3>
                <form th:action="@{/settings/master-data/locations}" method="post">
                    <input type="hidden" name="id" id="locId">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Kota</label>
                            <input type="text" name="city" id="locCity" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Provinsi / State</label>
                            <input type="text" name="stateProvince" id="locState" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Alamat Lengkap</label>
                        <textarea name="streetAddress" id="locAddress" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl h-24"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Kode Pos</label>
                            <input type="text" name="postalCode" id="locPostal" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">ID Negara (e.g., ID)</label>
                            <input type="text" name="countryId" id="locCountry" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl uppercase">
                        </div>
                    </div>
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="closeModal('modalLoc')" class="text-gray-500 font-bold px-4">Batal</button>
                        <button type="submit" id="locSubmit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal Dept -->
        <div id="modalDept" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                <h3 id="modalDeptTitle" class="text-2xl font-bold mb-6">Departemen</h3>
                <form th:action="@{/settings/master-data/departments}" method="post">
                    <input type="hidden" name="id" id="deptId">
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Nama Departemen</label>
                        <input type="text" name="name" id="deptName" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                    </div>
                    <div class="mb-8">
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Lokasi ID</label>
                        <input type="number" name="locationId" id="deptLocId" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl">
                    </div>
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="closeModal('modalDept')" class="text-gray-500 font-bold px-4">Batal</button>
                        <button type="submit" id="deptSubmit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function prepareModal(modalId, mode, data) {
            const modal = document.getElementById(modalId);
            const title = document.getElementById(modalId + 'Title');
            const submitBtn = document.getElementById(modalId.replace('modal', '').toLowerCase() + 'Submit');
            const form = modal.querySelector('form');
            const inputs = form.querySelectorAll('input, select, textarea');

            // Reset form
            form.reset();
            inputs.forEach(i => {
                i.disabled = (mode === 'detail');
                i.classList.remove('bg-gray-200');
                if (mode === 'detail') i.classList.add('bg-gray-200');
            });

            if (submitBtn) submitBtn.style.display = (mode === 'detail' ? 'none' : 'block');

            if (mode === 'add') {
                title.innerText = 'Tambah Data';
                if (form.querySelector('[name="id"]')) form.querySelector('[name="id"]').value = '';
                if (document.getElementById('jobId')) document.getElementById('jobId').disabled = false;
            } else {
                title.innerText = (mode === 'detail' ? 'Detail Data' : 'Ubah Data');
                
                // Populate data based on modal type
                if (modalId === 'modalRegion') {
                    document.getElementById('regionId').value = data.id;
                    document.getElementById('regionName').value = data.name;
                } else if (modalId === 'modalJob') {
                    document.getElementById('jobId').value = data.id;
                    document.getElementById('jobId').disabled = true; // Job ID is usually PK string
                    document.getElementById('jobTitle').value = data.title;
                    document.getElementById('jobMinSalary').value = data.minSalary;
                    document.getElementById('jobMaxSalary').value = data.maxSalary;
                } else if (modalId === 'modalLoc') {
                    document.getElementById('locId').value = data.id;
                    document.getElementById('locCity').value = data.city;
                    document.getElementById('locAddress').value = data.streetAddress;
                    document.getElementById('locState').value = data.stateProvince;
                    document.getElementById('locPostal').value = data.postalCode;
                    document.getElementById('locCountry').value = data.countryId;
                } else if (modalId === 'modalDept') {
                    document.getElementById('deptId').value = data.id;
                    document.getElementById('deptName').value = data.name;
                    document.getElementById('deptLocId').value = data.locationId;
                }
            }

            modal.classList.remove('hidden');
        }
    </script>
</body>
</html>
