<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-10 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Multi-Lokasi Absensi</h2>
                <p class="text-gray-500">Kelola berbagai area geofencing untuk lokasi kerja yang berbeda.</p>
            </div>
            <button onclick="openAddModal()" 
                    class="bg-blue-600 text-white px-8 py-4 rounded-3xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">
                + Tambah Lokasi Baru
            </button>
        </div>

        <!-- Grid Lokasi -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div th:each="loc : ${locations}" 
                 class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 hover:shadow-xl hover:shadow-gray-100 transition-all group relative overflow-hidden">
                <div class="flex justify-between items-start mb-6">
                    <div class="h-14 w-14 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center">
                        <i class="fas fa-map-location-dot text-2xl"></i>
                    </div>
                </div>
                
                <h4 class="text-xl font-black text-gray-900 mb-2" th:text="${loc.name}">Nama Lokasi</h4>
                <p class="text-sm text-gray-500 line-clamp-2 mb-6" th:text="${loc.description} ?: 'Tidak ada keterangan.'"></p>
                
                <div class="flex items-center space-x-4 mb-8">
                    <div class="flex-1 bg-gray-50 p-4 rounded-2xl">
                        <span class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Radius</span>
                        <span class="text-lg font-black text-gray-800" th:text="${loc.radius} + 'm'"></span>
                    </div>
                    <div class="flex-1 bg-gray-50 p-4 rounded-2xl">
                        <span class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Area</span>
                        <span class="text-lg font-black text-gray-800">Polygon</span>
                    </div>
                </div>

                <div class="flex justify-between items-center pt-6 border-t border-gray-50">
                    <div class="flex space-x-3">
                        <button class="text-blue-600 font-bold text-sm hover:underline" 
                                th:data-id="${loc.id}" th:data-name="${loc.name}" th:data-polygon="${loc.polygonJson}" 
                                th:data-radius="${loc.radius}" th:data-desc="${loc.description}"
                                onclick="detailLocation(this)">Detail</button>
                        <button class="text-amber-600 font-bold text-sm hover:underline" 
                                th:data-id="${loc.id}" th:data-name="${loc.name}" th:data-polygon="${loc.polygonJson}" 
                                th:data-radius="${loc.radius}" th:data-desc="${loc.description}"
                                onclick="editLocation(this)">Edit</button>
                    </div>
                    <form th:id="'deleteLoc' + ${loc.id}" th:action="@{/settings/attendance-locations/delete/{id}(id=${loc.id})}" method="post" class="inline">
                        <button type="button" class="text-red-500 font-bold text-sm hover:underline"
                                th:onclick="'confirmAction(\'deleteLoc' + ${loc.id} + '\', \'Hapus Lokasi?\', \'Karyawan tidak akan bisa absen di lokasi ini lagi.\', \'error\')'">Hapus</button>
                    </form>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(locations)}" class="col-span-full py-20 text-center text-gray-400 italic">
                Belum ada data lokasi absensi tambahan.
            </div>
        </div>

        <!-- Modal Location Custom Multi-Page style but single modal -->
        <div id="modalLoc" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-5xl shadow-2xl overflow-hidden flex flex-col relative border border-white max-h-[95vh]">
                <!-- Sticky Close Button -->
                <button type="button" onclick="closeModal()" 
                        class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-all z-[120] p-2 hover:bg-gray-50 rounded-full">
                    <i class="fas fa-times text-xl"></i>
                </button>

                <div class="flex flex-col lg:flex-row h-full">
                    <!-- Form Column -->
                    <div class="lg:w-1/3 p-10 bg-gray-50 border-r border-gray-100 overflow-y-auto custom-scrollbar">
                        <h3 id="modalTitle" class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Atur Lokasi</h3>
                        <form th:action="@{/settings/attendance-locations}" method="post" id="locForm" class="space-y-6">
                            <input type="hidden" name="id" id="locId">
                            <input type="hidden" name="polygonJson" id="polygonInput">
                            
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Nama Lokasi</label>
                                <input type="text" name="name" id="locName" required class="w-full px-6 py-4 bg-white border border-gray-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Radius (Meter)</label>
                                <input type="number" name="radius" id="locRadius" value="100" class="w-full px-6 py-4 bg-white border border-gray-200 rounded-2xl outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Keterangan</label>
                                <textarea name="description" id="locDesc" class="w-full px-6 py-4 bg-white border border-gray-200 rounded-2xl h-32 outline-none"></textarea>
                            </div>
                        </form>
                    </div>

                    <!-- Map Column -->
                    <div class="lg:w-2/3 p-10 flex flex-col relative bg-white">
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Gambar Area pada Peta</label>
                        <div id="map" class="flex-1 rounded-[2rem] border border-gray-100 z-0"></div>
                        <button type="button" onclick="findMyLocation()" 
                                class="absolute top-24 right-14 z-[400] bg-white p-4 rounded-2xl shadow-xl border border-gray-50 text-blue-600 hover:bg-blue-50 transition-all font-bold text-xs uppercase tracking-widest">
                            <i class="fas fa-location-arrow mr-2"></i> Cari Lokasi Saya
                        </button>
                        
                        <div class="flex justify-end space-x-4 pt-8">
                            <button type="button" onclick="closeModal()" class="px-8 py-4 text-gray-500 font-bold hover:text-gray-700">Tutup</button>
                            <button type="button" id="btnSave" onclick="submitLocForm()" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                                SIMPAN LOKASI
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet & Draw -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script th:inline="javascript">
        var map, drawnItems, drawControl, userMarker;
        var existingLayersGroup;
        /*[[${locations}]]*/
        var allLocations = [[${locations}]];

        function initMap() {
            if (map) return;
            map = L.map('map').setView([-6.200000, 106.816666], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);
            
            existingLayersGroup = new L.FeatureGroup();
            map.addLayer(existingLayersGroup);

            drawControl = new L.Control.Draw({
                edit: { featureGroup: drawnItems },
                draw: { 
                    polygon: { shapeOptions: { color: '#2563eb', fillOpacity: 0.4 } }, 
                    marker: false, 
                    circle: false, 
                    rectangle: { shapeOptions: { color: '#2563eb', fillOpacity: 0.4 } }, 
                    polyline: false, 
                    circlemarker: false 
                }
            });
            map.addControl(drawControl);

            map.on(L.Draw.Event.CREATED, function (e) {
                drawnItems.clearLayers();
                drawnItems.addLayer(e.layer);
                updatePolygonInput();
            });
            map.on(L.Draw.Event.EDITED, updatePolygonInput);
            map.on(L.Draw.Event.DELETED, updatePolygonInput);
        }

        function renderExistingLocations(excludeId) {
            if (!existingLayersGroup) return;
            existingLayersGroup.clearLayers();
            
            allLocations.forEach(function(loc) {
                if (loc.id == excludeId) return;
                
                if (loc.polygonJson && loc.polygonJson !== '[]') {
                    try {
                        var coords = JSON.parse(loc.polygonJson);
                        var poly = L.polygon(coords, {
                            color: '#94a3b8',
                            weight: 2,
                            dashArray: '5, 5',
                            fillColor: '#94a3b8',
                            fillOpacity: 0.1,
                            interactive: true
                        }).addTo(existingLayersGroup);
                        
                        poly.bindTooltip(loc.name, {
                            permanent: false,
                            direction: 'center',
                            className: 'font-black text-[10px] text-slate-500 uppercase tracking-tighter'
                        });
                    } catch(e) { console.error("Error parsing polygon for location: " + loc.name, e); }
                }
            });
        }

        // Escape Key Listener
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        function findMyLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    var latlng = [lat, lng];
                    
                    if (!userMarker) {
                        userMarker = L.marker(latlng, {
                            icon: L.divIcon({
                                html: '<i class="fas fa-crosshairs text-blue-600 text-2xl"></i>',
                                iconSize: [20, 20],
                                className: 'custom-div-icon'
                            })
                        }).addTo(map);
                    } else {
                        userMarker.setLatLng(latlng);
                    }
                    map.setView(latlng, 18);
                }, function() {
                    Toast.fire({ icon: 'error', title: 'Gagal mengakses lokasi.' });
                }, {enableHighAccuracy: true});
            }
        }

        function updatePolygonInput() {
            var layers = drawnItems.getLayers();
            if (layers.length > 0) {
                var layer = layers[0];
                var latlngs;
                if (layer instanceof L.Polygon) {
                    latlngs = layer.getLatLngs()[0];
                } else if (layer instanceof L.Rectangle) {
                    latlngs = layer.getLatLngs()[0];
                }
                
                if (latlngs) {
                    var data = latlngs.map(ll => [ll.lat, ll.lng]);
                    document.getElementById('polygonInput').value = JSON.stringify(data);
                }
            } else {
                document.getElementById('polygonInput').value = '[]';
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah Lokasi";
            document.getElementById('locForm').reset();
            document.getElementById('locId').value = "";
            document.getElementById('polygonInput').value = "[]";
            document.getElementById('btnSave').classList.remove('hidden');
            document.querySelectorAll('#locForm input, #locForm textarea').forEach(el => el.disabled = false);
            document.getElementById('modalLoc').classList.remove('hidden');
            setTimeout(function() {
                initMap();
                drawnItems.clearLayers();
                renderExistingLocations(null); // Show all existing
                if(!map.hasLayer(drawControl)) map.addControl(drawControl);
                map.invalidateSize();
            }, 100);
        }

        function detailLocation(btn) {
            editLocation(btn);
            document.getElementById('modalTitle').innerText = "Detail Lokasi";
            document.getElementById('btnSave').classList.add('hidden');
            document.querySelectorAll('#locForm input, #locForm textarea').forEach(el => el.disabled = true);
            if (drawControl) try { map.removeControl(drawControl); } catch(e) {}
        }

        function editLocation(btn) {
            var id = btn.getAttribute('data-id');
            var name = btn.getAttribute('data-name');
            var polygonJson = btn.getAttribute('data-polygon');
            var radius = btn.getAttribute('data-radius');
            var desc = btn.getAttribute('data-desc');
            openEditModal(id, name, polygonJson, radius, desc);
        }

        function openEditModal(id, name, polygonJson, radius, desc) {
            document.getElementById('modalTitle').innerText = "Edit Lokasi";
            document.getElementById('btnSave').classList.remove('hidden');
            document.querySelectorAll('#locForm input, #locForm textarea').forEach(el => el.disabled = false);
            
            document.getElementById('locId').value = id;
            document.getElementById('locName').value = name;
            document.getElementById('locRadius').value = radius;
            document.getElementById('locDesc').value = desc || "";
            document.getElementById('polygonInput').value = polygonJson;
            document.getElementById('modalLoc').classList.remove('hidden');
            
            setTimeout(function() {
                initMap();
                drawnItems.clearLayers();
                renderExistingLocations(id); // Exclude current ID
                if (map && !map.hasLayer(drawControl)) map.addControl(drawControl);

                if (polygonJson && polygonJson !== '[]') {
                    try {
                        var coords = JSON.parse(polygonJson);
                        var poly = L.polygon(coords, {color: '#2563eb', fillOpacity: 0.4}).addTo(drawnItems);
                        map.fitBounds(poly.getBounds());
                    } catch(e) {}
                }
                map.invalidateSize();
            }, 100);
        }

        function submitLocForm() {
            const isEdit = document.getElementById('locId').value !== '';
            confirmAction('locForm', isEdit ? 'Simpan Perubahan?' : 'Tambah Lokasi?', 'Konfigurasi geofencing lokasi ini akan diperbarui.', 'question');
        }

        function closeModal() { document.getElementById('modalLoc').classList.add('hidden'); }
    </script>
</body>
</html>
