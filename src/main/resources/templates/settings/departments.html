<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Departemen</h2>
                <p class="text-gray-500">Kelola struktur organisasi departemen.</p>
            </div>
            <button onclick="prepareModal('modalDept', 'add')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                + Tambah Departemen
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200" id="deptTable">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">ID</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Nama Departemen</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Lokasi ID</th>
                        <th class="px-8 py-5 text-right text-xs font-black text-gray-400 uppercase tracking-widest">Aksi</th>
                    </tr>
                    <tr class="bg-gray-50/50">
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(0)" placeholder="ID..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(1)" placeholder="Cari Dept..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(2)" placeholder="Loc ID..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td></td>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-100">
                    <tr th:each="d : ${departments}" class="hover:bg-blue-50/30 transition-colors">
                        <td class="px-8 py-5 text-xs text-gray-500" th:text="${d.id}"></td>
                        <td class="px-8 py-5 font-bold text-gray-800" th:text="${d.name}"></td>
                        <td class="px-8 py-5 text-gray-600" th:text="${d.locationId}"></td>
                        <td class="px-8 py-5 text-right space-x-3 text-sm">
                            <button class="text-blue-600 hover:underline font-bold" th:onclick="prepareModal('modalDept', 'detail', [[${d}]])">Detail</button>
                            <button class="text-amber-600 hover:underline font-bold" th:onclick="prepareModal('modalDept', 'edit', [[${d}]])">Edit</button>
                            <form th:action="@{/settings/master-data/departments/delete/{id}(id=${d.id})}" method="post" class="inline">
                                <button type="submit" class="text-red-500 hover:underline font-bold" onclick="return confirm('Hapus departemen ini?')">Hapus</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(departments)}">
                        <td colspan="4" class="px-8 py-12 text-center text-gray-400 italic">Belum ada data departemen.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Dept -->
        <div id="modalDept" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-sm shadow-2xl border border-white">
                <h3 id="modalTitle" class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Departemen</h3>
                <form th:action="@{/settings/master-data/departments}" method="post" class="space-y-6">
                    <input type="hidden" name="id" id="deptId">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Nama Departemen</label>
                        <input type="text" name="name" id="deptName" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl focus:ring-4 focus:ring-blue-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Lokasi ID</label>
                        <input type="number" name="locationId" id="deptLocId" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl">
                    </div>
                    <div class="flex justify-end space-x-4 pt-4">
                        <button type="button" onclick="closeModal('modalDept')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                        <button type="submit" id="btnSubmit" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                            SIMPAN
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function prepareModal(modalId, mode, data) {
            const modal = document.getElementById(modalId);
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('btnSubmit');
            const form = modal.querySelector('form');
            const inputs = form.querySelectorAll('input');

            form.reset();
            inputs.forEach(i => {
                i.disabled = (mode === 'detail');
                i.classList.remove('bg-gray-100');
                if (mode === 'detail') i.classList.add('bg-gray-100');
            });

            if (submitBtn) submitBtn.style.display = (mode === 'detail' ? 'none' : 'block');

            if (mode === 'add') {
                title.innerText = 'Tambah Departemen';
                document.getElementById('deptId').value = '';
            } else {
                title.innerText = (mode === 'detail' ? 'Detail Departemen' : 'Ubah Departemen');
                document.getElementById('deptId').value = data.id;
                document.getElementById('deptName').value = data.name;
                document.getElementById('deptLocId').value = data.locationId;
            }
            modal.classList.remove('hidden');
        }

        function filterTable(columnIndex) {
            const inputs = document.querySelectorAll('thead input');
            const rows = document.querySelectorAll('tbody tr:not(.empty-row)');
            rows.forEach(row => {
                let show = true;
                inputs.forEach((input, idx) => {
                    if (input.value) {
                        const cellText = row.cells[idx].innerText.toLowerCase();
                        if (!cellText.includes(input.value.toLowerCase())) show = false;
                    }
                });
                row.style.display = show ? '' : 'none';
            });
        }
    </script>
</body>
</html>
