<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Wilayah (Regions)</h2>
                <p class="text-gray-500">Kelola zona wilayah operasional perusahaan.</p>
            </div>
            <button onclick="prepareModal('modalRegion', 'add')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                + Tambah Wilayah
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">ID</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Nama Wilayah</th>
                        <th class="px-8 py-5 text-right text-xs font-black text-gray-400 uppercase tracking-widest">Aksi</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-100 text-sm">
                    <tr th:each="r : ${regions}" class="hover:bg-blue-50/30 transition-colors">
                        <td class="px-8 py-5 font-mono text-gray-500" th:text="${r.id}"></td>
                        <td class="px-8 py-5 font-bold text-gray-800" th:text="${r.name}"></td>
                        <td class="px-8 py-5 text-right space-x-3">
                            <button class="text-blue-600 hover:underline font-bold" 
                                    th:data-id="${r.id}" th:data-name="${r.name}"
                                    onclick="prepareModalByBtn(this, 'detail')">Detail</button>
                            <button class="text-amber-600 hover:underline font-bold" 
                                    th:data-id="${r.id}" th:data-name="${r.name}"
                                    onclick="prepareModalByBtn(this, 'edit')">Edit</button>
                            <form th:id="'deleteForm' + ${r.id}" th:action="@{/settings/master-data/regions/delete/{id}(id=${r.id})}" method="post" class="inline">
                                <button type="button" class="text-red-500 hover:underline font-bold" 
                                        th:data-form-id="'deleteForm' + ${r.id}"
                                        onclick="confirmAction(this.getAttribute('data-form-id'), 'Hapus Wilayah?', 'Data wilayah ini akan dihapus.', 'error')">Hapus</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Region -->
        <div id="modalRegion" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-md shadow-2xl border border-white max-h-[90vh] overflow-hidden flex flex-col relative">
                <!-- Close Button -->
                <button type="button" onclick="closeModal('modalRegion')" class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-colors z-[120]">
                    <i class="fas fa-times text-xl"></i>
                </button>

                <div class="p-10 overflow-y-auto custom-scrollbar">
                    <h3 id="modalTitle" class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Wilayah</h3>
                    <form id="formRegion" th:action="@{/settings/master-data/regions}" method="post" class="space-y-6">
                        <input type="hidden" name="id" id="regionId">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Nama Wilayah</label>
                            <input type="text" name="name" id="regionName" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl focus:ring-4 focus:ring-blue-100 outline-none transition-all">
                        </div>
                        <div class="flex justify-end space-x-4 pt-4">
                            <button type="button" onclick="closeModal('modalRegion')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                            <button type="button" onclick="submitRegionForm()" id="btnSubmit" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                                SIMPAN
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Escape Key Listener
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal('modalRegion');
        });

        function submitRegionForm() {
            const isEdit = document.getElementById('regionId').value !== '';
            confirmAction('formRegion', 
                isEdit ? 'Ubah Wilayah?' : 'Tambah Wilayah?', 
                isEdit ? 'Perubahan pada data wilayah ini akan disimpan.' : 'Data wilayah baru akan ditambahkan.',
                'question');
        }

        function prepareModalByBtn(btn, mode) {
            const data = {
                id: btn.getAttribute('data-id'),
                name: btn.getAttribute('data-name')
            };
            prepareModal('modalRegion', mode, data);
        }

        function prepareModal(modalId, mode, data) {
            const modal = document.getElementById(modalId);
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('btnSubmit');
            const form = modal.querySelector('form');
            const inputs = form.querySelectorAll('input');

            form.reset();
            inputs.forEach(i => {
                i.disabled = (mode === 'detail');
                i.classList.remove('bg-gray-100');
                if (mode === 'detail') i.classList.add('bg-gray-100');
            });

            if (submitBtn) submitBtn.style.display = (mode === 'detail' ? 'none' : 'block');

            if (mode === 'add') {
                title.innerText = 'Tambah Wilayah';
                document.getElementById('regionId').value = '';
            } else {
                title.innerText = (mode === 'detail' ? 'Detail Wilayah' : 'Ubah Wilayah');
                document.getElementById('regionId').value = data.id;
                document.getElementById('regionName').value = data.name;
            }
            modal.classList.remove('hidden');
        }
    </script>
</body>
</html>
