<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div class="max-w-4xl mx-auto">
        <div class="mb-10 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Pengaturan Lokasi Absen</h2>
                <p class="text-gray-500">Atur area aman (Geofencing) untuk kehadiran karyawan.</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-10">
                <form th:action="@{/settings/attendance}" method="post" id="settingForm" class="space-y-8">
                    <!-- Leaflet CSS -->
                    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
                    <!-- Leaflet Draw CSS -->
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
                    
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 ml-1">Gambar Area Kantor (Polygon)</label>
                        <div id="map" class="h-96 rounded-[2rem] border border-gray-100 z-0"></div>
                        <input type="hidden" name="officePolygon" id="officePolygonInput" th:value="${officePolygon}">
                    </div>

                    <div>
                        <label for="officeRadius" class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Radius Kehadiran (Meter)</label>
                        <input type="number" id="officeRadius" name="officeRadius" th:value="${officeRadius}" 
                               class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-gray-700">
                    </div>

                    <div class="flex justify-end pt-4">
                        <button type="button" onclick="submitSettingForm()" class="bg-blue-600 text-white px-12 py-5 rounded-[1.5rem] font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">
                            SIMPAN PENGATURAN
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Leaflet JS & Draw JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script th:inline="javascript">
        var map = L.map('map').setView([-6.200000, 106.816666], 15); // Jakarta Default
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var existingPolygon = /*[[${officePolygon}]]*/ '[]';
        if (existingPolygon && existingPolygon !== '[]') {
            try {
                var coords = JSON.parse(existingPolygon);
                if (coords.length > 0) {
                    var poly = L.polygon(coords, {color: '#2563eb', weight: 4, fillOpacity: 0.1}).addTo(drawnItems);
                    map.fitBounds(poly.getBounds());
                }
            } catch(e) { console.error("Error parsing polygon", e); }
        }

        var drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: {
                polygon: { shapeOptions: { color: '#2563eb' } },
                polyline: false,
                rectangle: { shapeOptions: { color: '#2563eb' } },
                circle: false,
                marker: false,
                circlemarker: false
            }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, function (event) {
            drawnItems.clearLayers();
            var layer = event.layer;
            drawnItems.addLayer(layer);
            updateInput();
        });

        map.on(L.Draw.Event.EDITED, updateInput);
        map.on(L.Draw.Event.DELETED, updateInput);

        function updateInput() {
            var layers = drawnItems.getLayers();
            if (layers.length > 0) {
                var latlngs = layers[0].getLatLngs()[0];
                var data = latlngs.map(ll => [ll.lat, ll.lng]);
                document.getElementById('officePolygonInput').value = JSON.stringify(data);
            } else {
                document.getElementById('officePolygonInput').value = '[]';
            }
        }

        function submitSettingForm() {
            confirmAction('settingForm', 'Simpan Pengaturan?', 'Area geofencing dan radius absensi akan diperbarui untuk seluruh sistem.', 'question');
        }
    </script>
</body>
</html>
