<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div class="max-w-4xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Pengaturan Lokasi Absen</h2>
                <p class="text-gray-500">Atur area aman (Geofencing) untuk kehadiran karyawan.</p>
            </div>
            <div th:if="${param.success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-2 rounded relative">
                Pengaturan berhasil disimpan!
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-8">
                <form th:action="@{/settings/attendance}" method="post" id="settingForm">
                    <!-- Leaflet CSS -->
                    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
                    <!-- Leaflet Draw CSS -->
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Gambar Area Kantor (Polygon)</label>
                        <div id="map" class="h-96 rounded-xl border border-gray-200 z-0"></div>
                        <input type="hidden" name="officePolygon" id="officePolygonInput" th:value="${officePolygon}">
                    </div>

                    <div class="mb-8">
                        <label for="officeRadius" class="block text-sm font-medium text-gray-700 mb-2">Radius Kehadiran (Meter)</label>
                        <input type="number" id="officeRadius" name="officeRadius" th:value="${officeRadius}" 
                               class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>

                    <div class="flex justify-end">
                        <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg hover:shadow-xl">
                            Simpan Pengaturan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Leaflet JS & Draw JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script th:inline="javascript">
        var map = L.map('map').setView([-6.200000, 106.816666], 15); // Jakarta Default
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var existingPolygon = /*[[${officePolygon}]]*/ '[]';
        if (existingPolygon && existingPolygon !== '[]') {
            try {
                var coords = JSON.parse(existingPolygon);
                if (coords.length > 0) {
                    var poly = L.polygon(coords, {color: 'blue'}).addTo(drawnItems);
                    map.fitBounds(poly.getBounds());
                }
            } catch(e) { console.error("Error parsing polygon", e); }
        }

        var drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: {
                polygon: true,
                polyline: false,
                rectangle: true,
                circle: false,
                marker: false,
                circlemarker: false
            }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, function (event) {
            drawnItems.clearLayers();
            var layer = event.layer;
            drawnItems.addLayer(layer);
            updateInput();
        });

        map.on(L.Draw.Event.EDITED, updateInput);
        map.on(L.Draw.Event.DELETED, updateInput);

        function updateInput() {
            var layers = drawnItems.getLayers();
            if (layers.length > 0) {
                var latlngs = layers[0].getLatLngs()[0];
                var data = latlngs.map(ll => [ll.lat, ll.lng]);
                document.getElementById('officePolygonInput').value = JSON.stringify(data);
            } else {
                document.getElementById('officePolygonInput').value = '[]';
            }
        }
    </script>
</body>
</html>
