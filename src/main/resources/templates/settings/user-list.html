<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Manajemen User & Akses</h2>
                <p class="text-gray-500">Kelola kredensial login dan hak akses karyawan.</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200" id="userTable">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">NIK / User</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Nama Lengkap</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Role</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Status</th>
                        <th class="px-8 py-5 text-right text-xs font-black text-gray-400 uppercase tracking-widest">Aksi</th>
                    </tr>
                    <tr class="bg-gray-50/50">
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(0)" placeholder="Cari NIK..." class="w-full text-xs border-none bg-transparent focus:ring-0"></td>
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(1)" placeholder="Cari Nama..." class="w-full text-xs border-none bg-transparent focus:ring-0"></td>
                        <td class="px-8 py-2"></td>
                        <td class="px-8 py-2"></td>
                        <td></td>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-100">
                    <tr th:each="u : ${users}" class="hover:bg-blue-50/30 transition-colors">
                        <td class="px-8 py-5 font-mono text-sm font-bold text-blue-600" th:text="${u.nik}"></td>
                        <td class="px-8 py-5 font-bold text-gray-800" th:text="${u.firstName + ' ' + u.lastName}"></td>
                        <td class="px-8 py-5">
                            <span th:class="${u.role == 'ADMIN' ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600'} + ' px-3 py-1 rounded-full text-[10px] font-black uppercase'"
                                  th:text="${u.role}">ADMIN</span>
                        </td>
                        <td class="px-8 py-5">
                            <span th:class="${u.isActive == true ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-400'} + ' px-3 py-1 rounded-full text-[10px] font-black uppercase'"
                                  th:text="${u.isActive == true ? 'AKTIF' : 'NON-AKTIF'}">AKTIF</span>
                        </td>
                        <td class="px-8 py-5 text-right space-x-3 text-sm">
                            <button class="text-amber-600 hover:underline font-bold" 
                                    th:data-id="${u.id}" th:data-name="${u.firstName + ' ' + u.lastName}"
                                    th:data-role="${u.role}" th:data-active="${u.isActive}"
                                    onclick="prepareUserModalByBtn(this)">Atur Akses</button>
                            <button class="text-blue-600 hover:underline font-bold" 
                                    th:data-id="${u.id}" th:data-nik="${u.nik}" th:data-name="${u.firstName}"
                                    onclick="prepareResetModalByBtn(this)">Reset Password</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Atur Akses (Role & Status) -->
        <div id="modalRole" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-sm shadow-2xl relative border border-white max-h-[90vh] overflow-hidden flex flex-col">
                <!-- Sticky Close Button -->
                <button type="button" onclick="closeModal('modalRole')" 
                        class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-all z-[120] p-2 hover:bg-gray-50 rounded-full">
                    <i class="fas fa-times text-xl"></i>
                </button>

                <div class="p-10 overflow-y-auto custom-scrollbar">
                    <h3 class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Atur Hak Akses</h3>
                    <form id="formRole" th:action="@{/settings/user-management/update-role}" method="post" class="space-y-6">
                        <input type="hidden" name="id" id="roleUserId">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Karyawan</label>
                            <p id="roleUserName" class="text-lg font-bold text-gray-800 px-1"></p>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Role Aplikasi</label>
                            <select name="role" id="roleUserSelect" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl appearance-none focus:ring-4 focus:ring-blue-100 outline-none">
                                <option value="EMPLOYEE">Karyawan (Absensi Saja)</option>
                                <option value="ADMIN">Administrator (Akses Penuh)</option>
                            </select>
                        </div>
                        <div class="flex items-center justify-between bg-gray-50 p-6 rounded-3xl">
                            <div>
                                <span class="block text-sm font-bold text-gray-700">Akun Aktif</span>
                                <span class="text-[10px] text-gray-400">Izinkan user untuk login</span>
                            </div>
                            <input type="checkbox" name="isActive" id="roleUserActive" value="true" class="w-6 h-6 rounded-lg text-blue-600 focus:ring-blue-500">
                        </div>
                        <div class="flex justify-end space-x-4 pt-4">
                            <button type="button" onclick="closeModal('modalRole')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                            <button type="button" onclick="submitRoleForm()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                                SIMPAN
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Modal Reset Password -->
        <div id="modalReset" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white rounded-[2.5rem] w-full max-w-sm shadow-2xl relative border border-white max-h-[90vh] overflow-hidden flex flex-col">
                <!-- Sticky Close Button -->
                <button type="button" onclick="closeModal('modalReset')" 
                        class="absolute top-8 right-8 text-gray-400 hover:text-gray-600 transition-all z-[120] p-2 hover:bg-gray-50 rounded-full">
                    <i class="fas fa-times text-xl"></i>
                </button>

                <div class="p-10 overflow-y-auto custom-scrollbar">
                    <h3 class="text-2xl font-black mb-8 text-gray-900 tracking-tight text-red-600">Reset Password</h3>
                    <form id="formReset" th:action="@{/settings/user-management/reset-password}" method="post" class="space-y-6">
                        <input type="hidden" name="id" id="resetUserId">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">User</label>
                            <p id="resetUserName" class="text-lg font-bold text-gray-800 px-1"></p>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Password Baru</label>
                            <input type="password" name="newPassword" required placeholder="••••••••" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl focus:ring-4 focus:ring-red-100 outline-none transition-all">
                            <p class="text-[10px] text-gray-400 mt-2 ml-1 italic">Karyawan diwajibkan segera mengganti password setelah reset.</p>
                        </div>
                        <div class="flex justify-end space-x-4 pt-4">
                            <button type="button" onclick="closeModal('modalReset')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                            <button type="button" onclick="submitResetForm()" class="bg-red-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-red-100 hover:bg-red-700 active:scale-95 transition-all">
                                RESET SEKARANG
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Escape Key Listener
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal('modalRole');
                closeModal('modalReset');
            }
        });

        function submitRoleForm() {
            confirmAction('formRole', 'Update Hak Akses?', 'Konfigurasi akses user ini akan segera diperbarui.', 'question');
        }

        function submitResetForm() {
            confirmAction('formReset', 'Reset Password?', 'User tidak akan bisa login dengan password lama.', 'warning');
        }

        function prepareUserModalByBtn(btn) {
            const data = {
                id: btn.getAttribute('data-id'),
                name: btn.getAttribute('data-name'),
                role: btn.getAttribute('data-role'),
                isActive: btn.getAttribute('data-active') === 'true'
            };
            prepareUserModal('modalRole', data);
        }

        function prepareUserModal(modalId, u) {
            document.getElementById('roleUserId').value = u.id;
            document.getElementById('roleUserName').innerText = u.name;
            document.getElementById('roleUserSelect').value = u.role;
            document.getElementById('roleUserActive').checked = u.isActive;
            document.getElementById(modalId).classList.remove('hidden');
        }

        function prepareResetModalByBtn(btn) {
            const data = {
                id: btn.getAttribute('data-id'),
                nik: btn.getAttribute('data-nik'),
                name: btn.getAttribute('data-name')
            };
            prepareResetModal('modalReset', data);
        }

        function prepareResetModal(modalId, u) {
            document.getElementById('resetUserId').value = u.id;
            document.getElementById('resetUserName').innerText = u.nik + ' (' + u.name + ')';
            document.getElementById(modalId).classList.remove('hidden');
        }

        function filterTable(columnIndex) {
            const inputs = document.querySelectorAll('thead input');
            const rows = document.querySelectorAll('tbody tr');
            rows.forEach(row => {
                let show = true;
                inputs.forEach((input, idx) => {
                    if (input && input.value) {
                        const cellText = row.cells[idx].innerText.toLowerCase();
                        if (!cellText.includes(input.value.toLowerCase())) show = false;
                    }
                });
                row.style.display = show ? '' : 'none';
            });
        }
    </script>
</body>
</html>
