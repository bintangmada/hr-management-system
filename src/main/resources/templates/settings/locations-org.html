<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Cabang / Lokasi</h2>
                <p class="text-gray-500">Kelola alamat fisik dan unit kerja perusahaan.</p>
            </div>
            <button onclick="prepareModal('modalLoc', 'add')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                + Tambah Cabang
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200" id="locTable">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Kota</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Provinsi</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Alamat</th>
                        <th class="px-8 py-5 text-left text-xs font-black text-gray-400 uppercase tracking-widest">Negara</th>
                        <th class="px-8 py-5 text-right text-xs font-black text-gray-400 uppercase tracking-widest">Aksi</th>
                    </tr>
                    <tr class="bg-gray-50/50">
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(0)" placeholder="Kota..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(1)" placeholder="Provinsi..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(2)" placeholder="Alamat..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td class="px-8 py-2"><input type="text" onkeyup="filterTable(3)" placeholder="Negara..." class="w-full text-xs border-none bg-transparent focus:ring-0 placeholder-gray-300"></td>
                        <td></td>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-100">
                    <tr th:each="l : ${locations}" class="hover:bg-blue-50/30 transition-colors">
                        <td class="px-8 py-5 font-bold text-gray-800" th:text="${l.city}"></td>
                        <td class="px-8 py-5 text-gray-600" th:text="${l.stateProvince}"></td>
                        <td class="px-8 py-5 text-gray-500 text-xs truncate max-w-xs" th:text="${l.streetAddress}"></td>
                        <td class="px-8 py-5 text-gray-600 font-mono text-xs" th:text="${l.countryId}"></td>
                        <td class="px-8 py-5 text-right space-x-3 text-sm">
                            <button class="text-blue-600 hover:underline font-bold" th:onclick="prepareModal('modalLoc', 'detail', [[${l}]])">Detail</button>
                            <button class="text-amber-600 hover:underline font-bold" th:onclick="prepareModal('modalLoc', 'edit', [[${l}]])">Edit</button>
                            <form th:action="@{/settings/master-data/locations/delete/{id}(id=${l.id})}" method="post" class="inline">
                                <button type="submit" class="text-red-500 hover:underline font-bold" onclick="return confirm('Hapus lokasi ini?')">Hapus</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(locations)}">
                        <td colspan="5" class="px-8 py-12 text-center text-gray-400 italic">Belum ada data lokasi cabang.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Location -->
        <div id="modalLoc" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] px-4">
            <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-lg shadow-2xl border border-white max-h-[90vh] overflow-y-auto">
                <h3 id="modalTitle" class="text-2xl font-black mb-8 text-gray-900 tracking-tight">Cabang / Lokasi</h3>
                <form th:action="@{/settings/master-data/locations}" method="post" class="space-y-6">
                    <input type="hidden" name="id" id="locId">
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Kota</label>
                            <input type="text" name="city" id="locCity" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl focus:ring-4 focus:ring-blue-100 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Provinsi / State</label>
                            <input type="text" name="stateProvince" id="locState" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Alamat Lengkap</label>
                        <textarea name="streetAddress" id="locAddress" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl h-24"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Kode Pos</label>
                            <input type="text" name="postalCode" id="locPostal" class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">ID Negara (e.g. ID)</label>
                            <input type="text" name="countryId" id="locCountry" required class="w-full px-6 py-5 bg-gray-50 border border-gray-100 rounded-3xl uppercase tracking-widest">
                        </div>
                    </div>
                    <div class="flex justify-end space-x-4 pt-4">
                        <button type="button" onclick="closeModal('modalLoc')" class="px-6 py-3 text-gray-500 font-bold hover:text-gray-700 transition-all">Batal</button>
                        <button type="submit" id="btnSubmit" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all">
                            SIMPAN
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function prepareModal(modalId, mode, data) {
            const modal = document.getElementById(modalId);
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('btnSubmit');
            const form = modal.querySelector('form');
            const inputs = form.querySelectorAll('input, textarea');

            form.reset();
            inputs.forEach(i => {
                i.disabled = (mode === 'detail');
                i.classList.remove('bg-gray-100');
                if (mode === 'detail') i.classList.add('bg-gray-100');
            });

            if (submitBtn) submitBtn.style.display = (mode === 'detail' ? 'none' : 'block');

            if (mode === 'add') {
                title.innerText = 'Tambah Cabang';
                document.getElementById('locId').value = '';
            } else {
                title.innerText = (mode === 'detail' ? 'Detail Cabang' : 'Ubah Cabang');
                document.getElementById('locId').value = data.id;
                document.getElementById('locCity').value = data.city;
                document.getElementById('locState').value = data.stateProvince;
                document.getElementById('locAddress').value = data.streetAddress;
                document.getElementById('locPostal').value = data.postalCode;
                document.getElementById('locCountry').value = data.countryId;
            }
            modal.classList.remove('hidden');
        }

        function filterTable(columnIndex) {
            const inputs = document.querySelectorAll('thead input');
            const rows = document.querySelectorAll('tbody tr:not(.empty-row)');
            rows.forEach(row => {
                let show = true;
                inputs.forEach((input, idx) => {
                    if (input.value) {
                        const cellText = row.cells[idx].innerText.toLowerCase();
                        if (!cellText.includes(input.value.toLowerCase())) show = false;
                    }
                });
                row.style.display = show ? '' : 'none';
            });
        }
    </script>
</body>
</html>
