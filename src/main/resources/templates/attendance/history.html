<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div class="max-w-xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-8">
            <a th:href="@{/attendance}" class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-gray-500 shadow-sm border border-gray-100">
                <i class="fas fa-chevron-left"></i>
            </a>
            <h2 class="text-2xl font-extrabold text-gray-900">Rekap Kehadiran</h2>
            <div class="w-12"></div>
        </div>

        <div class="space-y-4">
            <div th:each="att : ${history}" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div th:classappend="${att.checkOutTime != null ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'}" 
                         class="w-12 h-12 rounded-2xl flex items-center justify-center text-lg">
                        <i th:class="${att.checkOutTime != null ? 'fas fa-check' : 'fas fa-clock'}"></i>
                    </div>
                    <div>
                        <div class="font-bold text-gray-900" th:text="${#temporals.format(att.checkInTime, 'EEEE, dd MMM yyyy', new java.util.Locale('id'))}">Senin, 20 Apr 2026</div>
                        <div class="text-xs text-gray-400" th:text="${att.status}">HADIR (Kantor Pusat)</div>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-sm font-black text-gray-900" th:text="${#temporals.format(att.checkInTime, 'HH:mm') + ' - ' + (att.checkOutTime != null ? #temporals.format(att.checkOutTime, 'HH:mm') : '--:--')}">08:00 - 17:00</div>
                    <div class="text-[10px] font-bold text-gray-400 uppercase">Jam Kerja</div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(history)}" class="text-center py-20">
                <div class="text-gray-300 text-6xl mb-4">
                    <i class="fas fa-folder-open"></i>
                </div>
                <p class="text-gray-500 font-medium">Belum ada riwayat kehadiran.</p>
            </div>
        </div>
    </div>
</body>
</html>
