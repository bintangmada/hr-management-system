<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div class="max-w-md mx-auto px-4 py-8">
        <!-- Header User -->
        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-gray-100 mb-8 flex items-center space-x-4">
            <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 text-2xl font-bold">
                <span th:text="${#strings.substring(employee.firstName, 0, 1)}">B</span>
            </div>
            <div>
                <h3 class="text-xl font-bold text-gray-900" th:text="${employee.firstName + ' ' + employee.lastName}">Nama Karyawan</h3>
                <p class="text-sm text-gray-500" th:text="${'NIK: ' + employee.nik}">NIK: 2026001</p>
                <a th:href="@{/logout}" class="text-xs text-red-500 font-semibold hover:underline">Keluar</a>
            </div>
        </div>

        <!-- Attendance Logic -->
        <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-gray-100 relative overflow-hidden">
            <!-- Background Decoration -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full -mr-16 -mt-16 z-0"></div>

            <div class="relative z-10">
                <div th:if="${param.success == 'checkin'}" class="bg-green-50 text-green-700 px-4 py-3 rounded-2xl mb-6 text-sm flex items-center">
                    <i class="fas fa-check-circle mr-2"></i> Check-in Berhasil!
                </div>
                <div th:if="${param.success == 'checkout'}" class="bg-blue-50 text-blue-700 px-4 py-3 rounded-2xl mb-6 text-sm flex items-center">
                    <i class="fas fa-check-circle mr-2"></i> Check-out Berhasil!
                </div>

                <!-- STATE 1: NOT CHECKED IN -->
                <div th:if="${todayAttendance == null}">
                    <div class="text-center mb-6">
                        <span class="px-4 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-bold uppercase tracking-wider">Belum Absen</span>
                        <h2 class="text-2xl font-extrabold text-gray-900 mt-3">Waktunya Check-in</h2>
                    </div>
                    <form th:action="@{/attendance/check-in}" method="post" id="attendanceForm">
                        <input type="hidden" name="lat" id="lat">
                        <input type="hidden" name="lng" id="lng">
                        
                        <div class="mb-6">
                            <div id="miniMap" class="h-48 rounded-3xl border border-gray-100 shadow-inner"></div>
                            <div id="locationStatus" class="mt-3 text-center text-xs text-gray-400 italic">Mencari GPS...</div>
                        </div>

                        <button type="button" id="btnSubmit" disabled
                                class="w-full bg-blue-600 text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all disabled:opacity-30">
                            CHECK IN SEKARANG
                        </button>
                    </form>
                </div>

                <!-- STATE 2: CHECKED IN, WAITING FOR CHECK OUT -->
                <div th:if="${todayAttendance != null && todayAttendance.checkOutTime == null}">
                    <div class="text-center mb-6">
                        <span class="px-4 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold uppercase tracking-wider">Sudah Masuk</span>
                        <div class="mt-4 flex justify-around items-center bg-gray-50 rounded-2xl p-4">
                            <div>
                                <div class="text-[10px] text-gray-400 font-bold uppercase">Jam Masuk</div>
                                <div class="text-xl font-black text-gray-900" th:text="${#temporals.format(todayAttendance.checkInTime, 'HH:mm')}">08:00</div>
                            </div>
                            <div class="w-px h-8 bg-gray-200"></div>
                            <div>
                                <div class="text-[10px] text-gray-400 font-bold uppercase">Jam Pulang</div>
                                <div class="text-xl font-black text-gray-300 italic">--:--</div>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/attendance/check-out}" method="post" id="attendanceForm">
                        <input type="hidden" name="attendanceId" th:value="${todayAttendance.id}">
                        <input type="hidden" name="lat" id="lat">
                        <input type="hidden" name="lng" id="lng">

                        <div class="mb-6">
                            <div id="miniMap" class="h-48 rounded-3xl border border-gray-100 shadow-inner"></div>
                            <div id="locationStatus" class="mt-3 text-center text-xs text-gray-400 italic">Memantau Lokasi...</div>
                        </div>

                        <button type="button" id="btnSubmit" disabled
                                class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold text-lg shadow-xl hover:bg-black active:scale-95 transition-all disabled:opacity-30 uppercase tracking-widest">
                            Check Out Pulang
                        </button>
                    </form>
                </div>

                <!-- STATE 3: COMPLETED -->
                <div th:if="${todayAttendance != null && todayAttendance.checkOutTime != null}">
                    <div class="text-center py-8">
                        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                            <i class="fas fa-check-double"></i>
                        </div>
                        <h2 class="text-2xl font-extrabold text-gray-900">Mantap!</h2>
                        <p class="text-gray-500 mt-2 mb-8">Anda sudah menyelesaikan absen hari ini.</p>
                        
                        <div class="flex justify-around items-center bg-gray-50 rounded-3xl p-6 mb-8">
                            <div class="text-center">
                                <div class="text-[10px] text-gray-400 font-bold uppercase mb-1">Masuk</div>
                                <div class="text-lg font-bold text-gray-900" th:text="${#temporals.format(todayAttendance.checkInTime, 'HH:mm')}">08:00</div>
                            </div>
                            <div class="text-center">
                                <div class="text-[10px] text-gray-400 font-bold uppercase mb-1">Pulang</div>
                                <div class="text-lg font-bold text-gray-900" th:text="${#temporals.format(todayAttendance.checkOutTime, 'HH:mm')}">17:00</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 border-t border-gray-50 pt-6">
                    <a th:href="@{/attendance/rekap}" class="flex items-center justify-center space-x-3 text-blue-600 font-bold group">
                        <i class="fas fa-history transition-transform group-hover:rotate-12"></i>
                        <span>Lihat Rekap Kehadiran</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
        var map = L.map('miniMap', {zoomControl: false}).setView([-6.200000, 106.816666], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        var userMarker;
        var locations = /*[[${locations}]]*/ [];
        
        locations.forEach(function(loc) {
            if (loc.polygonJson && loc.polygonJson !== '[]') {
                try {
                    var coords = JSON.parse(loc.polygonJson);
                    L.polygon(coords, {color: 'blue', weight: 2, fillOpacity: 0.05}).addTo(map);
                } catch(e) {}
            }
        });

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(position) {
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;
                document.getElementById('lat').value = lat;
                document.getElementById('lng').value = lng;
                
                var latlng = [lat, lng];
                if (!userMarker) {
                    userMarker = L.circleMarker(latlng, {radius: 8, color: '#2563eb', fillOpacity: 1}).addTo(map);
                } else {
                    userMarker.setLatLng(latlng);
                }
                map.setView(latlng, 17);
                
                document.getElementById('locationStatus').innerText = "Lokasi terdeteksi & Akurat";
                document.getElementById('btnSubmit').disabled = false;
            }, null, {enableHighAccuracy: true});
        }

        var btnSubmit = document.getElementById('btnSubmit');
        if (btnSubmit) {
            btnSubmit.addEventListener('click', function() {
                this.classList.add('opacity-50', 'cursor-not-allowed');
                this.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';
                document.getElementById('attendanceForm').submit();
            });
        }
    </script>
</body>
</html>
