<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div class="max-w-md mx-auto px-4 py-8">
        <!-- Header User -->
        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-gray-100 mb-8 flex items-center space-x-4">
            <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 text-2xl font-bold">
                <span th:text="${employee.firstName != null && !#strings.isEmpty(employee.firstName) ? #strings.substring(employee.firstName, 0, 1) : 'U'}">B</span>
            </div>
            <div>
                <h3 class="text-xl font-bold text-gray-900" th:text="${employee.firstName + ' ' + employee.lastName}">Nama Karyawan</h3>
                <p class="text-sm text-gray-500" th:text="${'NIK: ' + employee.nik}">NIK: 2026001</p>
            </div>
        </div>

        <!-- Attendance Logic -->
        <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-gray-100 relative overflow-hidden">
            <!-- Background Decoration -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full -mr-16 -mt-16 z-0"></div>

            <div class="relative z-10">
                <div th:if="${param.success == 'checkin'}" class="bg-green-50 text-green-700 px-4 py-3 rounded-2xl mb-6 text-sm flex items-center">
                    <i class="fas fa-check-circle mr-2"></i> Check-in Berhasil!
                </div>
                <div th:if="${param.success == 'checkout'}" class="bg-blue-50 text-blue-700 px-4 py-3 rounded-2xl mb-6 text-sm flex items-center">
                    <i class="fas fa-check-circle mr-2"></i> Check-out Berhasil!
                </div>

                <!-- STATE 1: NOT CHECKED IN -->
                <div th:if="${todayAttendance == null}">
                    <div class="text-center mb-6">
                        <span class="px-4 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-bold uppercase tracking-wider">Belum Absen</span>
                        <h2 class="text-2xl font-extrabold text-gray-900 mt-3">Waktunya Check-in</h2>
                    </div>
                    <form th:action="@{/attendance/check-in}" method="post" id="attendanceForm">
                        <input type="hidden" name="lat" id="lat">
                        <input type="hidden" name="lng" id="lng">
                        
                        <div class="mb-6">
                            <div id="miniMap" class="h-48 rounded-3xl border border-gray-100 shadow-inner"
                                 th:data-locations="${locations != null ? #objects.nullSafe(locations, {}) : '[]'}"></div>
                            <div id="locationStatus" class="mt-3 text-center text-xs text-gray-400 italic">Mencari GPS...</div>
                        </div>

                        <button type="button" id="btnSubmit" disabled
                                class="w-full bg-blue-600 text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all disabled:opacity-30">
                            CHECK IN SEKARANG
                        </button>
                    </form>
                </div>

                <!-- STATE 2: CHECKED IN, WAITING FOR CHECK OUT -->
                <div th:if="${todayAttendance != null && todayAttendance.checkOutTime == null}">
                    <div class="text-center mb-6">
                        <span class="px-4 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold uppercase tracking-wider">Sudah Masuk</span>
                        <div class="mt-4 flex justify-around items-center bg-gray-50 rounded-2xl p-4">
                            <div>
                                <div class="text-[10px] text-gray-400 font-bold uppercase">Jam Masuk</div>
                                <div class="text-xl font-black text-gray-900" th:text="${#temporals.format(todayAttendance.checkInTime, 'HH:mm')}">08:00</div>
                            </div>
                            <div class="w-px h-8 bg-gray-200"></div>
                            <div>
                                <div class="text-[10px] text-gray-400 font-bold uppercase">Jam Pulang</div>
                                <div class="text-xl font-black text-gray-300 italic">--:--</div>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/attendance/check-out}" method="post" id="attendanceForm">
                        <input type="hidden" name="attendanceId" th:value="${todayAttendance.id}">
                        <input type="hidden" name="lat" id="lat">
                        <input type="hidden" name="lng" id="lng">

                        <div class="mb-6">
                            <div id="miniMap" class="h-48 rounded-3xl border border-gray-100 shadow-inner"
                                 th:data-locations="${locations != null ? #objects.nullSafe(locations, {}) : '[]'}"></div>
                            <div id="locationStatus" class="mt-3 text-center text-xs text-gray-400 italic">Memantau Lokasi...</div>
                        </div>

                        <button type="button" id="btnSubmit" disabled
                                class="w-full bg-slate-900 text-white py-5 rounded-3xl font-bold text-lg shadow-xl hover:bg-black active:scale-95 transition-all disabled:opacity-30 uppercase tracking-widest">
                            Check Out Pulang
                        </button>
                    </form>
                </div>

                <!-- STATE 3: COMPLETED -->
                <div th:if="${todayAttendance != null && todayAttendance.checkOutTime != null}">
                    <div class="text-center py-8">
                        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
                            <i class="fas fa-check-double"></i>
                        </div>
                        <h2 class="text-2xl font-extrabold text-gray-900">Mantap!</h2>
                        <p class="text-gray-500 mt-2 mb-8">Anda sudah menyelesaikan absen hari ini.</p>
                        
                        <div class="flex justify-around items-center bg-gray-50 rounded-3xl p-6 mb-8">
                            <div class="text-center">
                                <div class="text-[10px] text-gray-400 font-bold uppercase mb-1">Masuk</div>
                                <div class="text-lg font-bold text-gray-900" th:text="${#temporals.format(todayAttendance.checkInTime, 'HH:mm')}">08:00</div>
                            </div>
                            <div class="text-center">
                                <div class="text-[10px] text-gray-400 font-bold uppercase mb-1">Pulang</div>
                                <div class="text-lg font-bold text-gray-900" th:text="${#temporals.format(todayAttendance.checkOutTime, 'HH:mm')}">17:00</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 border-t border-gray-50 pt-6">
                    <a th:href="@{/attendance/rekap}" class="flex items-center justify-center space-x-3 text-blue-600 font-bold group">
                        <i class="fas fa-history transition-transform group-hover:rotate-12"></i>
                        <span>Lihat Rekap Kehadiran</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const mapContainer = document.getElementById('miniMap');
        const map = L.map('miniMap', { zoomControl: false, attributionControl: false }).setView([-6.200000, 106.816666], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Load Locations from Data Attribute
        let userMarker;
        try {
            const locationsData = mapContainer.getAttribute('data-locations');
            if (locationsData && locationsData !== '[]') {
                // Thymeleaf might output objects directly if configured, or as JSON string
                // We'll try to handle it safely
                let locs = [];
                try {
                    locs = JSON.parse(locationsData);
                } catch (e) {
                    // If not valid JSON, it might be an array-like string from Thymeleaf toString
                    console.warn("Failed to parse locations JSON, checking if it's already an object");
                }

                if (Array.isArray(locs)) {
                    locs.forEach(function(loc) {
                        if (loc.polygonJson && loc.polygonJson !== '[]') {
                            try {
                                var coords = JSON.parse(loc.polygonJson);
                                L.polygon(coords, {color: '#3b82f6', weight: 2, fillOpacity: 0.1, dashArray: '5, 5'}).addTo(map);
                            } catch(e) { console.error("Error drawing polygon", e); }
                        }
                        // Also show a circle for the radius if available
                        if (loc.latitude && loc.longitude && loc.radius) {
                            L.circle([loc.latitude, loc.longitude], {
                                radius: loc.radius,
                                color: '#3b82f6',
                                weight: 1,
                                fillOpacity: 0.05
                            }).addTo(map);
                        }
                    });
                }
            }
        } catch (err) {
            console.error("Error processing locations:", err);
        }

        // Geolocation Logic
        const statusEl = document.getElementById('locationStatus');
        const btnSubmit = document.getElementById('btnSubmit');
        const latInput = document.getElementById('lat');
        const lngInput = document.getElementById('lng');

        function updateLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            if (latInput) latInput.value = lat;
            if (lngInput) lngInput.value = lng;
            
            const latlng = [lat, lng];
            if (!userMarker) {
                userMarker = L.circleMarker(latlng, {
                    radius: 8, 
                    color: '#fff',
                    fillColor: '#2563eb', 
                    fillOpacity: 1,
                    weight: 3
                }).addTo(map);
                
                // Add an accuracy circle
                L.circle(latlng, { radius: accuracy, weight: 1, color: '#2563eb', fillOpacity: 0.1 }).addTo(map);
            } else {
                userMarker.setLatLng(latlng);
            }
            
            map.setView(latlng, 17);
            
            if (statusEl) {
                statusEl.innerHTML = '<span class="text-green-600 font-bold"><i class="fas fa-check-circle mr-1"></i> Lokasi Terdeteksi (Akurasi: ' + Math.round(accuracy) + 'm)</span>';
            }
            if (btnSubmit) btnSubmit.disabled = false;
        }

        function handleGeoError(error) {
            let msg = "Gagal mengambil lokasi.";
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    msg = "Izin lokasi ditolak. Harap izinkan akses lokasi di browser Anda.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    msg = "Informasi lokasi tidak tersedia. Pastikan GPS aktif.";
                    break;
                case error.TIMEOUT:
                    msg = "Waktu pencarian lokasi habis. Pastikan Anda berada di area terbuka.";
                    break;
            }
            
            if (statusEl) {
                statusEl.innerHTML = '<span class="text-red-500 font-bold"><i class="fas fa-exclamation-triangle mr-1"></i> ' + msg + '</span>';
            }

            Swal.fire({
                icon: 'error',
                title: 'Opps! Lokasi Gagal',
                text: msg + " Harap refresh halaman untuk mencoba lagi.",
                confirmButtonText: 'Refresh Halaman',
                confirmButtonColor: '#2563eb',
                showCancelButton: true,
                cancelButtonText: 'Tutup',
                customClass: { popup: 'rounded-[1.5rem]' }
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.reload();
                }
            });
        }

        if (navigator.geolocation) {
            // Options for better reliability
            const geoOptions = {
                enableHighAccuracy: true,
                timeout: 10000, // 10 seconds
                maximumAge: 0
            };

            // Using watchPosition for real-time updates
            navigator.geolocation.watchPosition(updateLocation, handleGeoError, geoOptions);
        } else {
            handleGeoError({ code: 0, message: "Geolocation not supported" });
        }

        // Form Submission Handling
        if (btnSubmit) {
            btnSubmit.addEventListener('click', function() {
                this.classList.add('opacity-50', 'cursor-not-allowed');
                this.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';
                const form = document.getElementById('attendanceForm');
                if (form) form.submit();
            });
        }

        // Fix for white map - ensure container size is ready
        setTimeout(() => {
            map.invalidateSize();
        }, 100);
    </script>
</body>
</html>
