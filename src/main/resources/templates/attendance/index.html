<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div class="max-w-md mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-blue-600">Presensi Digital</h2>
            <p class="text-gray-500">Silakan masukkan identitas untuk Check-in.</p>
        </div>

        <div th:if="${param.error == 'user_not_found'}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-6 text-sm">
            NIK atau Email tidak ditemukan. Mohon periksa kembali.
        </div>
        
        <div th:if="${param.success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl mb-6 text-sm">
            Check-in berhasil! Terima kasih.
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form th:action="@{/attendance/check-in}" method="post" id="attendanceForm">
                <input type="hidden" name="lat" id="lat">
                <input type="hidden" name="lng" id="lng">

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">NIK</label>
                    <input type="text" name="nik" required placeholder="Masukkan NIK Anda"
                           class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" name="email" required placeholder="nama@perusahaan.com"
                           class="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>

                <!-- Map Preview -->
                <div class="mb-8 relative">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Lokasi Anda</label>
                    <div id="miniMap" class="h-48 rounded-2xl border border-gray-200 z-0"></div>
                    <div id="locationStatus" class="mt-2 text-xs text-center text-gray-400 italic">Mencari lokasi GPS...</div>
                </div>

                <button type="button" id="btnSubmit" disabled
                        class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    CHECK IN SEKARANG
                </button>
            </form>
        </div>
    </div>

    <!-- Leaflet JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
        var map = L.map('miniMap', {zoomControl: false}).setView([-6.200000, 106.816666], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        var userMarker;
        var officePolygonJson = /*[[${officePolygon}]]*/ '[]';
        
        if (officePolygonJson && officePolygonJson !== '[]') {
            var coords = JSON.parse(officePolygonJson);
            L.polygon(coords, {color: 'blue', fillOpacity: 0.1}).addTo(map);
        }

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(position) {
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;
                
                document.getElementById('lat').value = lat;
                document.getElementById('lng').value = lng;
                
                var latlng = [lat, lng];
                if (!userMarker) {
                    userMarker = L.marker(latlng).addTo(map);
                } else {
                    userMarker.setLatLng(latlng);
                }
                map.setView(latlng, 17);
                
                document.getElementById('locationStatus').innerText = "Lokasi terdeteksi";
                document.getElementById('btnSubmit').disabled = false;
            }, function(err) {
                document.getElementById('locationStatus').innerText = "Gagal mengakses GPS. Pastikan GPS aktif.";
            }, {enableHighAccuracy: true});
        } else {
            alert("Browser Anda tidak mendukung Geolocation.");
        }

        document.getElementById('btnSubmit').addEventListener('click', function() {
            document.getElementById('attendanceForm').submit();
        });
    </script>
</body>
</html>
