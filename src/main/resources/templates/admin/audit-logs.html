<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Audit Logs</h2>
            <p class="text-gray-500">Histori aktivitas dan perubahan data dalam sistem.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Waktu</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Aktor</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Aksi</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Entitas</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Detail</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="log : ${logs}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" 
                            th:text="${#temporals.format(log.createdAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 py-1 text-xs font-medium bg-blue-100 text-blue-700 rounded-full" 
                                  th:text="${log.performedBy}"></span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800" th:text="${log.action}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                            <span th:text="${log.entityName}"></span> (#<span th:text="${log.entityId}"></span>)
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500" th:text="${log.details}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">Belum ada aktivitas tercatat.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
