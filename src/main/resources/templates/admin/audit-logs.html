<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div class="px-4 py-6">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-gray-800 tracking-tight">Audit Logs</h2>
                <p class="text-gray-500 font-medium">Pemantauan aktivitas sistem secara real-time dan terukur.</p>
            </div>
            <div id="tableButtons" class="flex gap-2">
                <!-- DataTables buttons will be moved here -->
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden p-8">
            <table class="min-w-full cell-border hover display responsive nowrap" id="auditTable" style="width:100%">
                <thead class="bg-gray-50/50">
                    <tr>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6">Waktu</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6">Role</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6">Nama</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6">NIK</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6">Aksi</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6">Entitas</th>
                        <th class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] text-left py-6">Detail</th>
                    </tr>
                    <tr class="search-row border-b border-gray-100">
                        <td class="p-2 pt-0"><input type="text" placeholder="Filter..." class="w-full text-[9px] p-2 bg-transparent focus:outline-none placeholder-gray-300 font-bold border-b border-transparent focus:border-blue-500 transition-all"></td>
                        <td class="p-2 pt-0"><input type="text" placeholder="Filter..." class="w-full text-[9px] p-2 bg-transparent focus:outline-none placeholder-gray-300 font-bold border-b border-transparent focus:border-blue-500 transition-all"></td>
                        <td class="p-2 pt-0"><input type="text" placeholder="Filter..." class="w-full text-[9px] p-2 bg-transparent focus:outline-none placeholder-gray-300 font-bold border-b border-transparent focus:border-blue-500 transition-all"></td>
                        <td class="p-2 pt-0"><input type="text" placeholder="Filter..." class="w-full text-[9px] p-2 bg-transparent focus:outline-none placeholder-gray-300 font-bold border-b border-transparent focus:border-blue-500 transition-all"></td>
                        <td class="p-2 pt-0"><input type="text" placeholder="Filter..." class="w-full text-[9px] p-2 bg-transparent focus:outline-none placeholder-gray-300 font-bold border-b border-transparent focus:border-blue-500 transition-all"></td>
                        <td class="p-2 pt-0"><input type="text" placeholder="Filter..." class="w-full text-[9px] p-2 bg-transparent focus:outline-none placeholder-gray-300 font-bold border-b border-transparent focus:border-blue-500 transition-all"></td>
                        <td class="p-2 pt-0"><input type="text" placeholder="Filter..." class="w-full text-[9px] p-2 bg-transparent focus:outline-none placeholder-gray-300 font-bold border-b border-transparent focus:border-blue-500 transition-all"></td>
                    </tr>
                </thead>
                <tbody class="text-sm text-gray-600">
                    <!-- Data loaded via Ajax -->
                </tbody>
            </table>
        </div>
    </div>

    <style>
        /* Minimalist DataTables Overrides */
        .dataTables_wrapper .dataTables_length select {
            border: none;
            background: #f8fafc;
            border-radius: 12px;
            padding: 8px 30px 8px 15px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
        }
        .dataTables_wrapper .dataTables_filter { display: none; }
        
        table.dataTable { border-collapse: collapse !important; border: none !important; }
        table.dataTable thead th { border-bottom: none !important; color: #94a3b8 !important; }
        table.dataTable tbody tr { background: transparent !important; }
        table.dataTable tbody tr:hover { background: #f8fafc !important; }
        table.dataTable tbody td { padding: 1.5rem 1rem !important; border: none !important; border-bottom: 1px solid #f1f5f9 !important; }
        
        .dt-buttons .dt-button {
            background: #f8fafc !important;
            border: none !important;
            border-radius: 12px !important;
            color: #64748b !important;
            font-size: 10px !important;
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.1em !important;
            padding: 10px 20px !important;
            box-shadow: none !important;
        }
        .dt-buttons .dt-button:hover {
            background: #eff6ff !important;
            color: #2563eb !important;
        }
        
        /* ColVis Collection Styling */
        .dt-button-collection {
            background: rgba(255, 255, 255, 0.98) !important;
            backdrop-filter: blur(10px);
            border-radius: 24px !important;
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
            padding: 12px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15) !important;
            margin-top: 10px !important;
        }
        .dt-button-collection .dt-button {
            background: transparent !important;
            border: none !important;
            border-radius: 12px !important;
            text-align: left !important;
            padding: 12px 16px !important;
            margin: 2px 0 !important;
            font-size: 11px !important;
            font-weight: 700 !important;
            color: #64748b !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            transition: all 0.2s !important;
        }
        .dt-button-collection .dt-button:hover {
            background: #f8fafc !important;
            color: #2563eb !important;
        }
        /* Checkbox indicator for active columns */
        .dt-button-collection .dt-button::after {
            content: "\f0c8"; /* Unchecked square */
            font-family: "Font Awesome 6 Free";
            font-weight: 400;
            margin-left: 10px;
            color: #cbd5e1;
            font-size: 14px;
        }
        .dt-button-collection .dt-button.active {
            background: #eff6ff !important;
            color: #2563eb !important;
        }
        .dt-button-collection .dt-button.active::after {
            content: "\f14a"; /* Checked square */
            font-weight: 900;
            color: #2563eb;
        }
        
        .dataTables_paginate .paginate_button {
            border: none !important;
            background: transparent !important;
            font-size: 11px !important;
            font-weight: 700 !important;
            border-radius: 10px !important;
            padding: 5px 12px !important;
        }
        .dataTables_paginate .paginate_button.current {
            background: #2563eb !important;
            color: white !important;
        }
        .dataTables_info {
            font-size: 11px !important;
            font-weight: 600 !important;
            color: #94a3b8 !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>

    <script th:inline="javascript">
    /*<![CDATA[*/
        $(document).ready(function() {
            const table = $('#auditTable').DataTable({
                processing: true,
                serverSide: true,
                responsive: true,
                orderCellsTop: true,
                ajax: {
                    url: '/admin/api/audit-logs',
                    type: 'GET'
                },
                columns: [
                    { 
                        data: 'createdAt',
                        render: function(data) {
                            if(!data) return '-';
                            const date = new Date(data);
                            return date.toLocaleString('id-ID', { 
                                day: '2-digit', month: 'short', year: 'numeric', 
                                hour: '2-digit', minute: '2-digit' 
                            });
                        }
                    },
                    { 
                        data: 'actorRole',
                        render: function(data) {
                            const role = data || 'USER';
                            const colorClass = role === 'ADMIN' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700';
                            return `<span class="px-2 py-0.5 text-[10px] font-black uppercase rounded-lg ${colorClass}">${role}</span>`;
                        }
                    },
                    { 
                        data: 'actorName',
                        render: function(data, type, row) {
                            return `<span class="font-bold text-gray-800">${data || row.performedBy || '-'}</span>`;
                        }
                    },
                    { data: 'actorNik' },
                    { 
                        data: 'action',
                        render: function(data) {
                            return `<span class="font-black text-xs text-gray-700 tracking-tight">${data}</span>`;
                        }
                    },
                    { 
                        data: 'entityName',
                        render: function(data, type, row) {
                            return `<span class="font-bold">${data}</span> <span class="text-gray-400">#${row.entityId}</span>`;
                        }
                    },
                    { 
                        data: 'details',
                        className: 'text-xs text-gray-500 leading-relaxed font-medium'
                    }
                ],
                order: [ [ 0, 'desc' ] ],
                lengthMenu: [
                    [ 10, 50, 100, 1000 ],
                    [ 10, 50, 100, 1000 ]
                ],
                dom: '<"flex justify-between items-center mb-4"lB>rt<"flex justify-between items-center mt-4"ip>',
                buttons: [
                    {
                        extend: 'colvis',
                        text: '<i class="fas fa-columns mr-2"></i> Kolom',
                        className: 'btn-colvis'
                    }
                ],
                language: {
                    lengthMenu: "Tampilkan _MENU_ data",
                    zeroRecords: "Data tidak ditemukan",
                    info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ data",
                    infoEmpty: "Menampilkan 0 sampai 0 dari 0 data",
                    infoFiltered: "(difilter dari _MAX_ total data)",
                    paginate: {
                        first: "Pertama",
                        last: "Terakhir",
                        next: "Lanjut",
                        previous: "Kembali"
                    }
                }
            });

            // Per-column search binding with debounce
            let searchTimeout = null;
            $('#auditTable thead .search-row input').on('keyup change', function() {
                const colIdx = $(this).closest('td').index();
                const val = this.value;
                
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    table.column(colIdx).search(val).draw();
                }, 300);
            });

            // Prevent sorting on search row click
            $('#auditTable thead .search-row').on('click', function(e) {
                e.stopPropagation();
            });
        });
    /*]]>*/
    </script>
</body>
</html>
