<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Manajemen Lokasi Absensi</h2>
                <p class="text-gray-500">Daftar semua cabang/titik lokasi yang diperbolehkan untuk absen.</p>
            </div>
            <button onclick="openAddModal()" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition-all">
                + Tambah Lokasi Baru
            </button>
        </div>

        <div th:if="${param.success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-2 rounded-xl mb-6 text-sm">
            Lokasi berhasil disimpan!
        </div>
        <div th:if="${param.deleted}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-xl mb-6 text-sm">
            Lokasi telah dihapus.
        </div>

        <!-- Datatable -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Nama Lokasi</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Radius</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Status Polygon</th>
                        <th class="px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase">Aksi</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="loc : ${locations}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-bold text-gray-900" th:text="${loc.name}"></div>
                            <div class="text-xs text-gray-400" th:text="${loc.description}"></div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${loc.radius + ' m'}"></td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span th:if="${loc.polygonJson != '[]'}" class="px-2 py-1 text-xs font-medium bg-blue-100 text-blue-700 rounded-full">Aktif</span>
                            <span th:unless="${loc.polygonJson != '[]'}" class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-400 rounded-full">Kosong</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm space-x-3">
                            <button th:onclick="'openEditModal(' + ${#strings.escapeJavaScript(loc.id)} + ', ' + ${#strings.escapeJavaScript(loc.name)} + ', ' + ${#strings.escapeJavaScript(loc.polygonJson)} + ', ' + ${loc.radius} + ')'" 
                                    class="text-blue-600 hover:text-blue-900 font-medium">Edit</button>
                            <form th:action="@{/settings/attendance-locations/delete/{id}(id=${loc.id})}" method="post" class="inline">
                                <button type="submit" class="text-red-600 hover:text-red-900 font-medium" onclick="return confirm('Hapus lokasi ini?')">Hapus</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal CRUD Location -->
        <div id="modalLoc" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100] p-4">
            <div class="bg-white rounded-3xl w-full max-w-4xl shadow-2xl overflow-hidden max-h-[95vh] flex flex-col">
                <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                    <h3 id="modalTitle" class="text-2xl font-bold">Tambah Lokasi</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div class="p-8 overflow-y-auto flex-1">
                    <form th:action="@{/settings/attendance-locations}" method="post" id="locForm" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <input type="hidden" name="id" id="locId">
                        <input type="hidden" name="polygonJson" id="polygonInput" value="[]">

                        <div class="lg:col-span-1 space-y-6">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Nama Lokasi / Cabang</label>
                                <input type="text" name="name" id="locName" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Radius (Meter)</label>
                                <input type="number" name="radius" id="locRadius" value="100" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Keterangan</label>
                                <textarea name="description" id="locDesc" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl h-24"></textarea>
                            </div>
                        </div>

                        <div class="lg:col-span-2">
                            <label class="block text-xs font-semibold text-gray-500 mb-2 ml-1">Gambar Area Polygon pada Peta</label>
                            <div id="map" class="h-96 rounded-2xl border border-gray-200 z-0"></div>
                            <p class="mt-2 text-[10px] text-gray-400 italic">Gunakan toolbar di kiri peta untuk menggambar area.</p>
                        </div>
                    </form>
                </div>
                <div class="p-6 border-t border-gray-100 flex justify-end space-x-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-2 text-gray-500 font-medium">Batal</button>
                    <button type="button" onclick="document.getElementById('locForm').submit()" class="bg-blue-600 text-white px-10 py-3 rounded-2xl font-bold shadow-lg">Simpan Lokasi</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet & Draw -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script th:inline="javascript">
        var map, drawnItems, drawControl;

        function initMap() {
            if (map) return;
            map = L.map('map').setView([-6.200000, 106.816666], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);

            drawControl = new L.Control.Draw({
                edit: { featureGroup: drawnItems },
                draw: { polygon: true, marker: false, circle: false, rectangle: true, polyline: false, circlemarker: false }
            });
            map.addControl(drawControl);

            map.on(L.Draw.Event.CREATED, function (e) {
                drawnItems.clearLayers();
                drawnItems.addLayer(e.layer);
                updatePolygonInput();
            });
            map.on(L.Draw.Event.EDITED, updatePolygonInput);
            map.on(L.Draw.Event.DELETED, updatePolygonInput);
        }

        function updatePolygonInput() {
            var layers = drawnItems.getLayers();
            if (layers.length > 0) {
                var latlngs = layers[0].getLatLngs()[0];
                var data = latlngs.map(ll => [ll.lat, ll.lng]);
                document.getElementById('polygonInput').value = JSON.stringify(data);
            } else {
                document.getElementById('polygonInput').value = '[]';
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah Lokasi";
            document.getElementById('locForm').reset();
            document.getElementById('locId').value = "";
            document.getElementById('polygonInput').value = "[]";
            document.getElementById('modalLoc').classList.remove('hidden');
            setTimeout(function() {
                initMap();
                drawnItems.clearLayers();
                map.invalidateSize();
            }, 100);
        }

        function openEditModal(id, name, polygonJson, radius) {
            document.getElementById('modalTitle').innerText = "Edit Lokasi";
            document.getElementById('locId').value = id;
            document.getElementById('locName').value = name;
            document.getElementById('locRadius').value = radius;
            document.getElementById('polygonInput').value = polygonJson;
            document.getElementById('modalLoc').classList.remove('hidden');
            
            setTimeout(function() {
                initMap();
                drawnItems.clearLayers();
                if (polygonJson && polygonJson !== '[]') {
                    var coords = JSON.parse(polygonJson);
                    var poly = L.polygon(coords).addTo(drawnItems);
                    map.fitBounds(poly.getBounds());
                }
                map.invalidateSize();
            }, 100);
        }

        function closeModal() { document.getElementById('modalLoc').classList.add('hidden'); }
    </script>
</body>
</html>
