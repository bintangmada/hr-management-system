<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Master Data</h2>
                <p class="text-gray-500">Kelola unit organisasi, wilayah, dan jabatan.</p>
            </div>
            <div th:if="${param.success}" class="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-sm font-medium">
                Data berhasil diperbarui!
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Regions -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800">Regions</h3>
                    <button onclick="openModal('modalRegion')" class="text-blue-600 text-sm font-bold">+ Tambah</button>
                </div>
                <table class="min-w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-50"><th class="pb-3 font-medium">ID</th><th class="pb-3 font-medium">Nama Region</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${regions}" class="border-b border-gray-50 last:border-0">
                            <td class="py-3 text-gray-500" th:text="${r.id}"></td>
                            <td class="py-3 font-medium text-gray-800" th:text="${r.name}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Jobs -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800">Jobs (Jabatan)</h3>
                    <button onclick="openModal('modalJob')" class="text-blue-600 text-sm font-bold">+ Tambah</button>
                </div>
                <table class="min-w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-50">
                            <th class="pb-3 font-medium">ID</th>
                            <th class="pb-3 font-medium">Jabatan</th>
                            <th class="pb-3 font-medium">Min Salary</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="j : ${jobs}" class="border-b border-gray-50 last:border-0">
                            <td class="py-3 text-gray-500" th:text="${j.id}"></td>
                            <td class="py-3 font-medium text-gray-800" th:text="${j.title}"></td>
                            <td class="py-3 text-gray-500" th:text="${#numbers.formatDecimal(j.minSalary, 0, 'COMMA', 0, 'POINT')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Departments -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800">Departments</h3>
                    <button onclick="openModal('modalDept')" class="text-blue-600 text-sm font-bold">+ Tambah</button>
                </div>
                <table class="min-w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-50"><th class="pb-3 font-medium">Nama Departemen</th><th class="pb-3 font-medium">Lokasi ID</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${departments}" class="border-b border-gray-50 last:border-0">
                            <td class="py-3 font-medium text-gray-800" th:text="${d.name}"></td>
                            <td class="py-3 text-gray-500" th:text="${d.locationId}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Locations -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-gray-800">Locations (Cabang)</h3>
                    <button onclick="openModal('modalLoc')" class="text-blue-600 text-sm font-bold">+ Tambah</button>
                </div>
                <table class="min-w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 text-left border-b border-gray-50"><th class="pb-3 font-medium">Kota</th><th class="pb-3 font-medium">Alamat</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="l : ${locations}" class="border-b border-gray-50 last:border-0">
                            <td class="py-3 font-medium text-gray-800" th:text="${l.city}"></td>
                            <td class="py-3 text-gray-500 text-xs" th:text="${l.streetAddress}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modals -->
        <!-- Modal Region -->
        <div id="modalRegion" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
            <div class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
                <h3 class="text-xl font-bold mb-6">Tambah Region</h3>
                <form th:action="@{/settings/master-data/regions}" method="post">
                    <input type="text" name="name" placeholder="Nama Region" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-6">
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="closeModal('modalRegion')" class="text-gray-500">Batal</button>
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal Job -->
        <div id="modalJob" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
            <div class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
                <h3 class="text-xl font-bold mb-6">Tambah Jabatan</h3>
                <form th:action="@{/settings/master-data/jobs}" method="post">
                    <input type="text" name="id" placeholder="ID Jabatan (e.g. IT_PROG)" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-4 text-xs font-mono">
                    <input type="text" name="title" placeholder="Nama Jabatan" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-4">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <input type="number" name="minSalary" placeholder="Min Salary" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl">
                        <input type="number" name="maxSalary" placeholder="Max Salary" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl">
                    </div>
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="closeModal('modalJob')" class="text-gray-500">Batal</button>
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal Location -->
        <div id="modalLoc" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
            <div class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
                <h3 class="text-xl font-bold mb-6">Tambah Lokasi</h3>
                <form th:action="@{/settings/master-data/locations}" method="post">
                    <input type="text" name="city" placeholder="Kota" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-4">
                    <textarea name="streetAddress" placeholder="Alamat Lengkap" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-4 h-24"></textarea>
                    <input type="text" name="countryId" placeholder="Country ID (e.g. ID)" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-6">
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="closeModal('modalLoc')" class="text-gray-500">Batal</button>
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal Dept -->
        <div id="modalDept" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
            <div class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
                <h3 class="text-xl font-bold mb-6">Tambah Departemen</h3>
                <form th:action="@{/settings/master-data/departments}" method="post">
                    <input type="text" name="name" placeholder="Nama Departemen" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-4">
                    <input type="number" name="locationId" placeholder="Location ID" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-6">
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="closeModal('modalDept')" class="text-gray-500">Batal</button>
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Simpan</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
