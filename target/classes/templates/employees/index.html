<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:fragment="area_konten">
    <div>
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Daftar Karyawan</h2>
                <p class="text-gray-500">Katalog lengkap data karyawan perusahaan.</p>
            </div>
            <button onclick="openModal('modalEmployee')" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg">
                + Tambah Karyawan
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">NIK / Nama</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Jabatan</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Departemen</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="emp : ${employees}" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold mr-3" 
                                     th:text="${#strings.substring(emp.firstName,0,1)}"></div>
                                <div>
                                    <div class="text-sm font-bold text-gray-900" th:text="${emp.firstName + ' ' + emp.lastName}"></div>
                                    <div class="text-xs text-gray-400" th:text="${emp.nik}"></div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${emp.jobId}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${emp.departmentId}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${emp.email}"></td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                            <form th:action="@{/employees/delete/{id}(id=${emp.id})}" method="post" class="inline">
                                <button type="submit" class="text-red-600 hover:text-red-900 font-medium" 
                                        onclick="return confirm('Apakah Anda yakin ingin menghapus karyawan ini?')">
                                    Hapus
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">Belum ada data karyawan.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Modal Employee -->
        <div id="modalEmployee" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-[100]">
            <div class="bg-white p-8 rounded-3xl w-[32rem] shadow-2xl max-h-[90vh] overflow-y-auto">
                <h3 class="text-2xl font-bold mb-6">Tambah Karyawan Baru</h3>
                <form th:action="@{/employees}" method="post" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">NIK</label>
                            <input type="text" name="nik" placeholder="Contoh: 123456" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Email</label>
                            <input type="email" name="email" placeholder="email@perusahaan.com" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Nama Depan</label>
                            <input type="text" name="firstName" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Nama Belakang</label>
                            <input type="text" name="lastName" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Jabatan</label>
                        <select name="jobId" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                            <option value="">Pilih Jabatan</option>
                            <option th:each="j : ${jobs}" th:value="${j.id}" th:text="${j.title}"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1 ml-1">Departemen</label>
                        <select name="departmentId" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl">
                            <option value="">Pilih Departemen</option>
                            <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                        </select>
                    </div>
                    <div class="flex justify-end space-x-4 pt-6">
                        <button type="button" onclick="closeModal('modalEmployee')" class="text-gray-500 font-medium">Batal</button>
                        <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">Simpan Karyawan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
